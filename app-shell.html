<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f6f8fa;
    --fg: #1f2328;
    --fg-muted: #656d76;
    --border: #d0d7de;
    --accent: #0969da;
    --accent-fg: #ffffff;
    --code-bg: #f6f8fa;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
    --radius: 8px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  html.dark {
    --bg: #0d1117;
    --bg-alt: #161b22;
    --fg: #e6edf3;
    --fg-muted: #8b949e;
    --border: #30363d;
    --accent: #2f81f7;
    --accent-fg: #ffffff;
    --code-bg: #161b22;
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- 工具栏 ---------- */
  .toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 12px; background: var(--bg-alt);
    border-bottom: 1px solid var(--border); flex-wrap: nowrap; min-height: 50px;
  }
  .toolbar .group { display: flex; gap: 2px; align-items: center; flex: none; }
  /* 格式按钮组：可收缩 + 横向滚动，窗口变窄时不把右侧控件挤到第二行 */
  .toolbar .group-fmt { flex: 0 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: thin; }
  .toolbar .group-fmt::-webkit-scrollbar { height: 4px; }
  .toolbar .group-fmt::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 6px; flex: none; }
  .toolbar .spacer { flex: 1; }
  /* ---------- 标签页 ---------- */
  .tabs { display: flex; gap: 3px; overflow-x: auto; flex: 1; min-width: 0;
    scrollbar-width: thin; padding: 1px 0; }
  .tabs::-webkit-scrollbar { height: 4px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tab {
    display: inline-flex; align-items: center; gap: 6px; padding-block: 4px; padding-inline: 10px 6px;
    border-radius: 6px; font-size: 12px; color: var(--fg-muted); cursor: default;
    white-space: nowrap; flex: 0 1 180px; min-width: 96px; transition: background .12s, color .12s;
  }
  .tab .tab-name { overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
  .tab:hover { background: var(--border); color: var(--fg); }
  .tab.active { background: var(--accent); color: var(--accent-fg); }
  .tab-dirty { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: none; }
  .tab.active .tab-dirty { background: var(--accent-fg); }
  .tab-close { appearance: none; border: 0; background: transparent; color: inherit;
    font-size: 15px; line-height: 1; padding: 0 4px; border-radius: 4px; cursor: default; opacity: .55; flex: none; }
  .tab-close:hover { opacity: 1; background: rgba(0,0,0,.12); }
  html.dark .tab-close:hover { background: rgba(255,255,255,.18); }

  .btn {
    appearance: none; border: 1px solid transparent; background: transparent;
    color: var(--fg); font-family: var(--sans); font-size: 13px; padding: 5px 9px;
    border-radius: 6px; cursor: default; display: inline-flex; align-items: center;
    justify-content: center; gap: 5px; line-height: 1; white-space: nowrap; transition: background .12s;
  }
  .btn:hover { background: var(--border); }
  .btn:active { background: var(--accent); color: var(--accent-fg); }
  .btn.icon { padding: 5px 8px; font-weight: 600; min-width: 30px; }
  .btn.primary { background: var(--accent); color: var(--accent-fg); }
  .btn.primary:hover { filter: brightness(1.08); background: var(--accent); }
  .btn.active { background: var(--accent); color: var(--accent-fg); }
  select.btn { padding-inline-end: 9px; text-align: center; text-align-last: center; }

  /* ---------- 主区域 ---------- */
  .main { flex: 1; display: grid; grid-template-columns: 1fr 5px 1fr; min-height: 0; }
  .main.view-editor { grid-template-columns: 1fr 0 0; }
  .main.view-preview { grid-template-columns: 0 0 1fr; }
  .gutter { background: var(--border); cursor: col-resize; transition: background .15s; }
  .gutter:hover, .gutter.dragging { background: var(--accent); }
  .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
  .pane.collapsed { display: none; }
  /* 空状态：关闭所有标签后，主区域不再自动新建空白标签，
     改为居中显示「请打开或创建一个 Markdown 文件」提示。 */
  .empty-state {
    display: none; grid-column: 1 / -1;
    align-items: center; justify-content: center;
    text-align: center; color: var(--fg-muted);
    font-size: 15px; line-height: 1.9; user-select: none;
  }
  .empty-state .empty-icon { font-size: 40px; opacity: .45; margin-bottom: 14px; }
  .main.no-tabs > #pane-editor,
  .main.no-tabs > #gutter,
  .main.no-tabs > #pane-preview { display: none; }
  .main.no-tabs > .empty-state { display: flex; }
  .pane-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-muted);
    padding: 5px 16px; min-height: 38px; background: var(--bg-alt); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  #editor {
    flex: 1; width: 100%; border: 0; outline: 0; resize: none; padding: 20px 24px;
    font-family: var(--mono); font-size: 14px; line-height: 1.7;
    background: var(--bg); color: var(--fg); tab-size: 2;
  }
  #editor.colsel-active { caret-color: transparent; }

  /* ---------- 搜索替换栏 ---------- */
  #search-bar { background: var(--bg-alt); border-bottom: 1px solid var(--border); padding: 6px 10px; flex: none; }
  #search-bar[hidden] { display: none; }
  .search-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
  .search-row:last-child { margin-bottom: 0; }
  .search-row input { flex: 1; min-width: 0; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 5px; background: var(--bg); color: var(--fg); font-size: 13px; outline: 0; }
  .search-row input:focus { border-color: var(--accent); }
  #search-count { font-size: 11px; color: var(--fg-muted); white-space: nowrap; min-width: 50px; text-align: center; }
  #search-bar .btn { padding: 3px 8px; font-size: 13px; }

  /* ---------- 预览 ---------- */
  #preview {
    flex: 1; overflow-y: auto; padding: 32px 40px 140px;
    background: var(--bg); line-height: 1.7; font-size: 16px;
  }
  #preview > *:first-child { margin-top: 0; }
  .vcontent > *:first-child { margin-top: 0; } /* 虚拟化：可见区首块去顶边距，与全量渲染一致 */
  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
    margin: 1.6em 0 .6em; font-weight: 600; line-height: 1.25; }
  #preview h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  #preview h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  #preview h3 { font-size: 1.25em; } #preview h4 { font-size: 1em; }
  #preview p { margin: 0 0 1em; text-align: justify; }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview strong { font-weight: 600; }
  #preview ul, #preview ol { margin: 0 0 1em; padding-inline-start: 2em; }
  #preview li + li { margin-top: .25em; }
  #preview blockquote { margin: 0 0 1em; padding: 0 1em; color: var(--fg-muted);
    border-inline-start: .25em solid var(--border); }
  #preview hr { border: 0; border-top: 1px solid var(--border); margin: 1.8em 0; }
  #preview code { font-family: var(--mono); font-size: .88em; background: var(--code-bg);
    padding: .2em .4em; border-radius: 5px; }
  #preview pre { background: var(--code-bg); padding: 14px 16px; border-radius: var(--radius);
    overflow-x: auto; margin: 0 0 1em; border: 1px solid var(--border); }
  #preview pre code { background: none; padding: 0; font-size: .85em; line-height: 1.5; }
  /* RTL（<html dir="rtl">，如阿拉伯语）：代码块 / 行内代码 / LaTeX 公式始终保持 LTR，
     作为独立双向"孤岛"不被整体镜像翻转——英文词、版本号(v1.1.0)等由 Unicode 双向算法
     天然在 RTL 段落内保持 LTR，无需额外处理。
     选择器含 #preview/.katex，buildStandaloneHtml 导出时会随样式一并收集，故导出文档同样生效。 */
  html[dir="rtl"] #preview pre,
  html[dir="rtl"] #preview code,
  html[dir="rtl"] #preview .katex,
  html[dir="rtl"] #preview .katex-display,
  html[dir="rtl"] .help-body pre,
  html[dir="rtl"] .help-body code { direction: ltr; unicode-bidi: isolate; text-align: start; }
  /* RTL：方向性图标（左右箭头、侧边栏折叠等）水平镜像；给元素加 .rtl-mirror 即生效。
     当前界面无此类图标，留作扩展钩子。 */
  html[dir="rtl"] .rtl-mirror { transform: scaleX(-1); }
  #preview img { max-width: 100%; border-radius: var(--radius); }
  /* 图片与表格默认居中：所有「含图片」的段落/列表项/单元格/引用整体居中，
     不再用 only-child，避免「有的居中、有的靠左」的混排（所有含图块一律居中）。 */
  #preview p:has(img),
  #preview li:has(img),
  #preview td:has(img),
  #preview blockquote:has(img) { text-align: center; }
  /* 表格由 renderIntoPreview 包一层 .table-wrap：窄表按内容居中，宽表在容器内横向滚动 */
  #preview table { border-collapse: collapse; margin: 0 0 1em; }
  #preview .table-wrap { overflow-x: auto; margin: 0 0 1em; }
  #preview .table-wrap > table { display: table; margin: 0 auto; width: auto; }
  /* mermaid 图：包一层 .mermaid-wrap，居中、宽图横向滚动；错误回退为代码块 */
  #preview .mermaid-wrap { margin: 0 0 1em; text-align: center; overflow-x: auto; }
  #preview .mermaid-wrap > svg { max-width: 100%; height: auto; }
  #preview .mermaid-err { color: #d33; font-family: var(--mono); font-size: .85em; text-align: start;
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 13px; }
  #preview th { background: var(--bg-alt); font-weight: 600; }
  #preview tr:nth-child(2n) { background: var(--bg-alt); }
  #preview li:has(> input[type="checkbox"]) { list-style: none; margin-inline-start: -1.2em; }
  #preview li input[type="checkbox"] { margin: 0; margin-inline-end: .5em; }
  #preview .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
  .mdmath { display: block; } /* display 公式容器（包 .katex-display），便于折行重渲 */
  /* 超长 display 公式：wrapDisplayMath() 优先在顶层 = + - 处折行重渲为多行（gathered），
     把溢出部分放到下一行；无法断行时才回退到等比缩小。*/

  /* ---------- 状态栏 ---------- */
  .statusbar { display: flex; align-items: center; gap: 14px; padding: 4px 16px;
    font-size: 11px; color: var(--fg-muted); background: var(--bg-alt);
    border-top: 1px solid var(--border); }
  .statusbar .right { margin-inline-start: auto; display: flex; gap: 14px; }

  /* ---------- 拖拽遮罩 ---------- */
  .dropmask { position: fixed; inset: 0; background: rgba(9,105,218,.12);
    border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center;
    z-index: 50; font-size: 18px; color: var(--accent); font-weight: 600; pointer-events: none; }
  body.dragging .dropmask { display: flex; }

  /* ---------- Toast ---------- */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--fg); color: var(--bg); padding: 9px 18px; border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity .2s, transform .2s; z-index: 100; pointer-events: none;
    box-shadow: var(--shadow); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- PDF 导出进度（非阻塞浮标）---------- */
  #pdf-progress { position: fixed; inset-inline-end: 18px; bottom: 56px; background: var(--fg); color: var(--bg);
    padding: 9px 16px; border-radius: 8px; font-size: 13px; box-shadow: var(--shadow); z-index: 150;
    display: none; align-items: center; gap: 9px; pointer-events: none; }
  #pdf-progress.show { display: flex; }
  #pdf-progress .spin { width: 12px; height: 12px; border: 2px solid var(--bg);
    border-top-color: transparent; border-radius: 50%; animation: pdf-spin 0.8s linear infinite; }
  @keyframes pdf-spin { to { transform: rotate(360deg); } }

  /* ---------- 矢量 PDF：通过 Tauri 的 WebviewWindow::print() 触发系统打印对话框 ---------- */
  /* 调用 print_webview 前已把完整内容挂回预览；@media print 仅显示预览，文字/公式矢量输出。 */
  /* @page 设每页四周留白（wry 默认打印边距为 0，须靠 @page 补足上下左右页边距）。 */
  @page { margin: 10mm 12mm; }
  @media print {
    html, body { height: auto !important; background: #fff !important; }
    .toolbar, .statusbar, .pane-head, #pane-editor, .gutter, #pdf-progress,
    .dropmask, .modal-mask { display: none !important; }
    .main { display: block !important; grid-template-columns: none !important; }
    #pane-preview { display: block !important; }
    #preview {
      overflow: visible !important; height: auto !important; padding: 0 !important;
      background: #fff !important; color: #000 !important;
    }
    #preview pre, #preview code, #preview table th { background: #f6f8fa !important; color: #000 !important; }
    /* 块内不分页：公式/代码/表格/列表项整体保持，避免切断 */
    #preview > * { page-break-inside: avoid; break-inside: avoid; }
    .katex-display { page-break-inside: avoid; break-inside: avoid; }
    .vcontent > * { page-break-inside: avoid; break-inside: avoid; }
  }

  /* ---------- 关闭确认弹窗 ---------- */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-mask[hidden] { display: none; }
  .modal-card {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); padding: 20px 22px;
    min-width: 320px; max-width: 440px; font-size: 14px;
  }
  .modal-msg { margin-bottom: 16px; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-actions .btn { padding: 6px 14px; }
  /* 格式/分辨率选择：按钮多，需换行居中、卡片加宽，避免首项被挤出可视区 */
  .choice-card { max-width: 600px; }
  .choice-actions { flex-wrap: wrap; justify-content: center; gap: 8px 10px; }
  .choice-actions .btn { padding: 7px 14px; }

  /* ---------- 帮助弹窗（宽、可滚动）---------- */
  .help-card { max-width: 760px; width: 92vw; max-height: 84vh; padding: 0; overflow: hidden;
    display: flex; flex-direction: column; }
  .help-head { display: flex; justify-content: space-between; align-items: center;
    padding: 13px 18px; border-bottom: 1px solid var(--border); flex: none; }
  .help-head .help-title { font-weight: 600; font-size: 15px; }
  .help-close { appearance: none; border: 0; background: transparent; color: var(--fg-muted);
    font-size: 22px; line-height: 1; cursor: default; padding: 0 6px; border-radius: 6px; }
  .help-close:hover { background: var(--border); color: var(--fg); }
  .help-body { padding: 18px 24px 24px; overflow-y: auto; line-height: 1.65; font-size: 14px; }
  .help-body h2 { margin: 1.4em 0 .5em; font-size: 1.05em; font-weight: 600;
    padding-bottom: .25em; border-bottom: 1px solid var(--border); }
  .help-body h2:first-child { margin-top: 0; }
  .help-body p { margin: 0 0 .7em; }
  .help-body .pron-line { font-size: 1.1em; background: var(--code-bg); padding: .5em .8em;
    border-radius: 6px; margin: 0 0 1em; }
  .help-body .pron-line code { font-size: 1em; background: none; padding: 0; }
  .help-body ul, .help-body ol { margin: 0 0 .8em; padding-inline-start: 1.6em; }
  .help-body li + li { margin-top: .2em; }
  .help-body code { font-family: var(--mono); font-size: .88em; background: var(--code-bg);
    padding: .12em .35em; border-radius: 4px; }
  .help-body pre { background: var(--code-bg); padding: 12px 14px; border-radius: 6px;
    overflow-x: auto; margin: 0 0 .9em; border: 1px solid var(--border); }
  .help-body pre code { background: none; padding: 0; font-size: .85em; }
  .help-body table { border-collapse: collapse; margin: 0 0 .9em; }
  .help-body th, .help-body td { border: 1px solid var(--border); padding: 5px 12px; text-align: start; }
  .help-body th { background: var(--bg-alt); font-weight: 600; }
  .help-body .contact { margin-top: 1em; padding: 12px 16px; background: var(--bg-alt);
    border: 1px solid var(--border); border-radius: 8px; }
  .help-body .contact .name { font-weight: 600; }
  .help-body .contact a { color: var(--accent); }

  /* ---------- 导出 PDF 的离屏捕获容器 ---------- */
  /* 作为「一页高度的裁剪窗口」：固定 A4 宽（96dpi ≈ 794px）、白底黑字、复制 #preview 排版；
     内层用 transform 上移逐页截取。padding 放内层，本容器只负责裁剪。 */
  .pdf-capture {
    position: fixed; left: -100000px; top: 0; width: 794px;
    background: #fff; color: #000; font-family: var(--sans); font-size: 14px; line-height: 1.7;
  }
  .pdf-capture h1,.pdf-capture h2,.pdf-capture h3,.pdf-capture h4,
  .pdf-capture h5,.pdf-capture h6 { margin: 1.2em 0 .5em; font-weight: 600; line-height: 1.25; }
  .pdf-capture h1 { font-size: 1.8em; border-bottom: 1px solid #ccc; padding-bottom: .2em; }
  .pdf-capture h2 { font-size: 1.4em; border-bottom: 1px solid #ddd; padding-bottom: .2em; }
  .pdf-capture h3 { font-size: 1.15em; }
  .pdf-capture p { margin: 0 0 .8em; text-align: justify; }
  .pdf-capture a { color: #0969da; }
  .pdf-capture ul,.pdf-capture ol { margin: 0 0 .8em; padding-inline-start: 2em; }
  .pdf-capture li + li { margin-top: .2em; }
  .pdf-capture blockquote { margin: 0 0 .8em; padding: 0 1em; color: #555; border-inline-start: .25em solid #ccc; }
  .pdf-capture hr { border: 0; border-top: 1px solid #ccc; margin: 1.4em 0; }
  .pdf-capture code { font-family: var(--mono); font-size: .88em; background: #f6f8fa; padding: .15em .35em; border-radius: 4px; }
  .pdf-capture pre { background: #f6f8fa; padding: 12px 14px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
  .pdf-capture pre code { background: none; padding: 0; font-size: .85em; }
  .pdf-capture img { max-width: 100%; }
  .pdf-capture p:has(img), .pdf-capture li:has(img),
  .pdf-capture td:has(img), .pdf-capture blockquote:has(img) { text-align: center; }
  .pdf-capture table { border-collapse: collapse; margin: 0 0 .8em; }
  .pdf-capture .table-wrap { overflow: visible; margin: 0 0 .8em; }
  .pdf-capture .table-wrap > table { display: table; margin: 0 auto; width: auto; }
  .pdf-capture .mermaid-wrap { margin: 0 0 .8em; text-align: center; overflow: visible; }
  .pdf-capture .mermaid-wrap > svg { max-width: 100%; height: auto; }
  .pdf-capture th,.pdf-capture td { border: 1px solid #ccc; padding: 5px 10px; }
  .pdf-capture th { background: #f0f0f0; }
  .pdf-capture .katex { font-size: 1.05em; }

  /* ---------- 文献引用（BibTeX）---------- */
  .cite { font-size: .75em; font-weight: 600; color: var(--accent); margin: 0 1px; white-space: nowrap; }
  .cite a { color: inherit; text-decoration: none; }
  .cite a:hover { text-decoration: underline; }
  .bibliography { margin-top: 2em; padding-top: 1em; border-top: 1px solid var(--border); }
  .bibliography h2 { font-size: 1.15em; margin: 0 0 .6em; font-weight: 600; }
  .biblist { list-style: none; padding-inline-start: 0; margin: 0; }
  .bibitem { margin: .4em 0; line-height: 1.55; padding-inline-start: 2.6em; text-indent: -2.6em; }
  .bibitem .bib-title { font-weight: 500; }
  .bibitem em { font-style: italic; }

<script type="text/plain" id="cite-example-tpl-zh"># 文献引用示例

本示例演示 BibTeX 文献引用。文献库已**内嵌**在文末的 `bibtex` 代码块里，无需单独加载 .bib 即可渲染；也可删掉它改用工具栏「文献」按钮加载外部 .bib。

## 1. 基本引用

CRISPR-Cas9 基因编辑工具最初被报道 [@jinek2012]，随后发展出 SHERLOCK 检测平台 [@gootenberg2017]。

## 2. 多文献并列（分号分隔）

基因编辑与核酸检测两项突破 [@jinek2012; @gootenberg2017] 推动了分子生物学发展。

## 3. 带定位符

具体机制见 [@jinek2012, p. 816]。

## 4. 同一文献多次引用

SHERLOCK 平台 [@gootenberg2017] 在现场诊断中 [@gootenberg2017, p. 440] 多次被采用。

## 5. LaTeX 兼容写法

也可用传统 LaTeX 命令：\cite{lowe1999} 提出 SIFT 特征。

## 6. 未知文献

库中没有的 key 会渲染为问号 [@nonexistent2024]，类似 LaTeX 的 [?] 行为。

## 7. 多键带定位

多键并列并附定位符（定位符作用于整组）：[@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440]。

---

## 内嵌文献库（自包含，预览中不可见）

下面的 `bibtex` 块会被抽走去建文献库，预览区看不到它：

```bibtex
@article{gootenberg2017,
  author  = {Gootenberg, Jonathan S. and Abudayyeh, Omar O. and Lee, Winston and others},
  title   = {Highly multiplexed {RNA} detection with {SHERLOCK}},
  journal = {Science},
  year    = {2017},
  volume  = {360},
  number  = {6389},
  pages   = {439--444}
}
@article{jinek2012,
  author  = {Jinek, Martin and Chylinski, Krzysztof and Fonfara, Ines and Hauer, Michael and Doudna, Jennifer A.},
  title   = {A programmable dual-{RNA}-guided {DNA} endonuclease in adaptive bacterial immunity},
  journal = {Science},
  year    = {2012},
  volume  = {337},
  pages   = {816--821}
}
@inproceedings{lowe1999,
  author    = {Lowe, David G.},
  title     = {Object recognition from local scale-invariant features},
  booktitle = {Proceedings of the IEEE International Conference on Computer Vision},
  year      = {1999},
  pages     = {1150--1157}
}
```

<script type="text/plain" id="cite-example-tpl-en"># Citation Example

This example demonstrates BibTeX citations. The bibliography is **embedded** in the `bibtex` code block at the end of the document, so no separate .bib is needed for rendering; you may also delete it and use the toolbar "References" button to load an external .bib.

## 1. Basic Citation

The CRISPR-Cas9 gene-editing tool was first reported [@jinek2012], followed by the development of the SHERLOCK detection platform [@gootenberg2017].

## 2. Multiple References (Semicolon-Separated)

Two breakthroughs—gene editing and nucleic acid detection [@jinek2012; @gootenberg2017]—have advanced molecular biology.

## 3. With Locator

See [@jinek2012, p. 816] for the specific mechanism.

## 4. Repeated Citations of the Same Reference

The SHERLOCK platform [@gootenberg2017] has been used multiple times in field diagnostics [@gootenberg2017, p. 440].

## 5. LaTeX-Compatible Syntax

You may also use the traditional LaTeX command: \cite{lowe1999} introduced SIFT features.

## 6. Unknown Reference

A key not present in the library renders as a question mark [@nonexistent2024], similar to LaTeX's [?] behavior.

## 7. Multiple Keys With Locator

Multiple keys with a locator (the locator applies to the whole group): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

---

<script type="text/plain" id="cite-example-tpl-fr"># Exemple de citation bibliographique

Cet exemple illustre les citations bibliographiques BibTeX. La bibliographie est **embarquée** dans le bloc de code `bibtex` à la fin du document, il n'est pas nécessaire de charger un fichier .bib séparé pour le rendu ; vous pouvez aussi le supprimer et charger un .bib externe via le bouton « Bibliographie » de la barre d'outils.

## 1. Citation simple

L'outil d'édition génétique CRISPR-Cas9 a été initialement décrit [@jinek2012], suivi du développement de la plateforme de détection SHERLOCK [@gootenberg2017].

## 2. Citations multiples (séparées par un point-virgule)

Deux avancées, l'édition génétique et la détection d'acides nucléiques [@jinek2012; @gootenberg2017], ont stimulé le développement de la biologie moléculaire.

## 3. Avec localisateur

Le mécanisme détaillé se trouve en [@jinek2012, p. 816].

## 4. Citation multiple de la même référence

La plateforme SHERLOCK [@gootenberg2017] a été utilisée à plusieurs reprises dans le diagnostic sur le terrain [@gootenberg2017, p. 440].

## 5. Syntaxe compatible LaTeX

Vous pouvez aussi utiliser la commande LaTeX classique : \cite{lowe1999} a introduit les descripteurs SIFT.

## 6. Référence inconnue

Une clé absente de la bibliographie est rendue sous forme de point d'interrogation [@nonexistent2024], comme le comportement [?] de LaTeX.

## 7. Clés multiples avec localisateur

Plusieurs clés juxtaposées avec un localisateur (le localisateur s'applique à tout le groupe) : [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

<script type="text/plain" id="cite-example-tpl-de"># Literaturverweis-Beispiel

Dieses Beispiel demonstriert BibTeX-Literaturverweise. Die Literaturdatenbank ist **eingebettet** im `bibtex`-Codeblock am Ende des Dokuments und kann ohne separates Laden einer .bib-Datei gerendert werden; alternativ kann sie entfernt und über die Schaltfläche „Literatur" in der Symbolleiste eine externe .bib geladen werden.

## 1. Einfache Verweise

Das CRISPR-Cas9-Geneditierungswerkzeug wurde erstmals berichtet [@jinek2012], anschließend wurde die SHERLOCK-Nachweisplattform entwickelt [@gootenberg2017].

## 2. Mehrere Quellen parallel (semikolongetrennt)

Die beiden Durchbrüche Geneditierung und Nukleinsäurenachweis [@jinek2012; @gootenberg2017] haben die Entwicklung der Molekularbiologie vorangetrieben.

## 3. Mit Fundstelle

Den konkreten Mechanismus siehe [@jinek2012, p. 816].

## 4. Mehrfache Verweise auf dieselbe Quelle

Die SHERLOCK-Plattform [@gootenberg2017] wurde in der Point-of-Care-Diagnostik [@gootenberg2017, p. 440] mehrfach eingesetzt.

## 5. LaTeX-kompatible Schreibweise

Auch der traditionelle LaTeX-Befehl lässt sich verwenden: \cite{lowe1999} führte SIFT-Merkmale ein.

## 6. Unbekannter Literaturbeleg

Ein nicht in der Datenbank vorhandener key wird als Fragezeichen gerendert [@nonexistent2024], analog zum [?]-Verhalten von LaTeX.

## 7. Mehrere keys mit Fundstelle

Mehrere keys parallel mit Fundstelle (die Fundstelle wirkt auf die gesamte Gruppe): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

<script type="text/plain" id="cite-example-tpl-ru"># Пример библиографических ссылок

В этом примере демонстрируются библиографические ссылки BibTeX. Библиотека литературы **встроена** в блок кода `bibtex` в конце документа, поэтому рендеринг выполняется без отдельной загрузки .bib; её также можно удалить и загрузить внешний .bib через кнопку «Литература» на панели инструментов.

## 1. Базовая ссылка

Инструмент редактирования генов CRISPR-Cas9 был впервые описан [@jinek2012], затем была разработана платформа обнаружения SHERLOCK [@gootenberg2017].

## 2. Несколько источников подряд (через точку с запятой)

Два прорыва — редактирование генов и обнаружение нуклеиновых кислот [@jinek2012; @gootenberg2017] — продвинули развитие молекулярной биологии.

## 3. С указателем

Подробное описание механизма см. [@jinek2012, p. 816].

## 4. Многократные ссылки на один источник

Платформа SHERLOCK [@gootenberg2017] неоднократно применялась в полевой диагностике [@gootenberg2017, p. 440].

## 5. Совместимый с LaTeX синтаксис

Можно также использовать традиционную команду LaTeX: \cite{lowe1999} предложил признаки SIFT.

## 6. Неизвестный источник

Ключ, отсутствующий в библиотеке, отображается как вопросительный знак [@nonexistent2024], аналогично поведению [?] в LaTeX.

## 7. Несколько ключей с указателем

Несколько ключей подряд с указателем (указатель применяется ко всей группе): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

---

<script type="text/plain" id="mermaid-example-tpl-zh"># Mermaid 图示例

## 2. 时序图（sequenceDiagram）

```mermaid
sequenceDiagram
    participant U as 用户
    participant F as 前端

    F->>B: POST /login
    B-->>F: 200 OK + Token

```mermaid
classDiagram
    class Animal {

    }

    }

> 주: erDiagram의 관계 라벨에 한글 등 비 ASCII 문자가 포함된 경우 큰따옴표로 감싸야 합니다(예: `: "주문"`). 그렇지 않으면 mermaid 어휘 분석기가 인식하지 못합니다.

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "주문"
    ORDER ||--|{ LINE_ITEM : "포함"
    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> 이 프로그램은 완전히 오프라인으로 동작하며, Mermaid 렌더링 엔진이 내장되어 있어 인터넷에 연결하지 않아도 위의 모든 다이어그램을 렌더링할 수 있습니다. 더 많은 문법은 Mermaid 공식 문서를 참조하세요 (인터넷 연결 시 mermaid.js.org에 접속).

<script type="text/plain" id="mermaid-example-tpl-es"># Ejemplo de diagramas Mermaid

Este ejemplo ilustra los distintos tipos de diagramas Mermaid. En Markdown basta con usar un bloque de código <code>```mermaid</code>; la vista previa lo renderiza automáticamente como SVG. Modificar el código modifica el diagrama, y al exportar a PDF / HTML también se incluye.

## 1. Diagrama de flujo (flowchart)

```mermaid

    D --> E[Introducir credenciales]
    E --> C
    C --> F[Fin]
```

## 2. Diagrama de secuencia (sequenceDiagram)

```mermaid
sequenceDiagram

    participant F as Frontend
    participant B as Backend

    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: Ir a la página principal
```

## 3. Diagrama de clases (classDiagram)

```mermaid
classDiagram
    class Animal {
        +String name
        +int age

    }

        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. Diagrama de estados (stateDiagram-v2)

```mermaid
stateDiagram-v2
    [*] --> PendientePago
    PendientePago --> Pagado : Usuario paga
    Pagado --> Enviado : Comerciante envía

    Recibido --> [*]

```

```mermaid
gantt
    title Progreso del proyecto

    Diseño de prototipo :after a1, 5d

    Desarrollo backend :2025-01-13, 12d

```

```

## 7. Diagrama entidad-relación (erDiagram)

> Nota: si las etiquetas de relación de erDiagram contienen caracteres no ASCII (como acentos del español u otros), deben ir entre comillas dobles (p. ej. `: "hace pedido"`); de lo contrario, el analizador léxico de mermaid no las reconoce.

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "hace pedido"

    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> Este programa es totalmente offline e integra el motor de renderizado de Mermaid, por lo que puede renderizar todos los diagramas anteriores sin conexión. Para más sintaxis, consulte la documentación oficial de Mermaid (acceda a mermaid.js.org cuando haya conexión).

<script type="text/plain" id="mermaid-example-tpl-ar"># مثال مخططات Mermaid

يوضّح هذا المثال أنواعًا مختلفة من مخططات Mermaid. يكفي استخدام كتلة شيفرة <code>```mermaid</code> في Markdown، وتقوم المعاينة تلقائيًا بعرضها كـ SVG. تعديل الشيفرة يعني تعديل المخطط، كما تُضمَّن المخططات عند التصدير إلى PDF / HTML.

```mermaid

    class Animal {

    }

        +fetch() void
    }

        +purr() void
    }

    تم_الشحن --> تم_الاستلام: استلام المستخدم

**完全フロントエンド・完全オフライン**の Markdown エディタで、Tauri v2 ベース、リアルタイムプレビュー、LaTeX 数式、画像、コードハイライトに対応しています。

## 機能

- ✅ 左右分割のリアルタイムプレビュー（比率をドラッグで調整）
- ✅ 数式：インライン $E = mc^2$、$e^{i\pi}+1=0$
- ✅ 画像：貼り付け / ドラッグ / 選択、自動的に base64 で埋め込み
- ✅ コードハイライト（言語を自動認識）
- ✅ 表、タスクリスト、引用、取り消し線
- ✅ ダーク / ライトテーマ、Markdown / PDF / LaTeX として保存、自動ドラフト保存

## 数式

オイラーの等式 $e^{i\pi} + 1 = 0$。

$$
\int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}
$$

## コード

```python
def fib(n):
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a
```

| ⌘S | 保存 | .md ファイル |
| ⌘⇧S | 名前を付けて保存 | .md / .pdf / .tex |

- [x] LaTeX 数式
- [x] 画像処理
- [ ] 執筆を始めましょう

> **ヒント**：メニュー「ファイル」から開く / 保存できます；`.md` ファイルをウィンドウにドラッグすると直接開けます。

<script type="text/plain" id="mdex-example-tpl-ar"># مرحبًا بك في محرّر Markdown

- ✅ الجداول وقوائم المهام والاقتباس والشطب
- ✅ السمة الداكنة / الفاتحة، وحفظ باسم Markdown / PDF / LaTeX، مع حفظ المسودة تلقائيًا

$$

  let curLang = "zh";
  // 从右向左（RTL）语言集合：切换到这些语言时设 <html dir="rtl">，正文/标题/列表自动右起排版。
  // 当前仅阿拉伯语(ar)；将来新增希伯来语(he)/乌尔都语(ur)/波斯语(fa) 等加进此集合即可。
  const RTL_LANGS = new Set(["ar"]);
  function t(k) { return (I18N[curLang] && I18N[curLang][k]) || I18N.zh[k] || k; }
  function setLang(lang) {
    if (!I18N[lang]) lang = "zh";
    curLang = lang;
    try { localStorage.setItem("md-lang", lang); } catch (_) {}
    applyLang();
    if (isTauri) invoke("change_language", { lang }).catch(() => {});
    scheduleRender();
  }
  function applyLang() {
    document.documentElement.lang = curLang;
    // RTL：阿拉伯语等从右向左语言设 <html dir="rtl">，正文/标题/列表自动右起排版、项目符号落最右；
    // 代码块/行内代码/LaTeX 公式等内嵌 LTR 内容由样式表局部强制 direction:ltr（双向孤岛），不被整体镜像。

    document.documentElement.dir = RTL_LANGS.has(curLang) ? "rtl" : "ltr";
    document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.getAttribute("data-i18n")); });
    document.querySelectorAll("[data-i18n-title]").forEach((el) => { el.title = t(el.getAttribute("data-i18n-title")); });
    document.querySelectorAll("[data-i18n-ph]").forEach((el) => { el.placeholder = t(el.getAttribute("data-i18n-ph")); });
    refreshDynamicLabels();

    updateStats();
  }
  function refreshDynamicLabels() {
    $("sync-btn").textContent = t("sync") + ":" + (syncScroll ? t("on") : t("off"));

    // 1) 块级：$$...$$ 与 \[...\]（可跨行）
    src = src.replace(/\$\$([\s\S]+?)\$\$|\\\[([\s\S]+?)\\\]/g, (m, a, b) => {

    src = src.replace(/\$([^\n$]+?)\$|\\\(([\s\S]+?)\\\)/g, (m, a, b) => {

  /* ---------- 文献引用（BibTeX，numeric / unsrt 风格）----------

  //     [@a; @b, p. 12] → {keys:["a","b"], locator:"p. 12"}

  function parseCiteInner(inner) {

  function scanCitations(src) {

  // 格式化作者列表：1 人 "J. Smith"｜2 人 "J. Smith and B. Jones"｜≥3 人 "J. Smith et al."
  function fmtAuthors(au) {

  // 格式化单条文献（unsrt 风格）。字段已由库做 LaTeX→unicode 解码（-- → en-dash、重音等）。
  function fmtEntry(e) {
    const f = e && e.fields ? e.fields : {};

    const au = fmtAuthors(f.author);
    if (au) parts.push(au);
    if (f.title) parts.push('<span class="bib-title">' + escapeHtml(f.title) + "</span>");
    const venue = [];
    if (f.journal) venue.push("<em>" + escapeHtml(f.journal) + "</em>");
    else if (f.booktitle) venue.push("<em>" + escapeHtml(f.booktitle) + "</em>");
    else if (f.publisher) venue.push(escapeHtml(f.publisher));
    const volnum = [];
    if (f.volume) volnum.push(escapeHtml(String(f.volume)));
    if (f.number) volnum.push("(" + escapeHtml(String(f.number)) + ")");
    if (volnum.length) venue.push(volnum.join(""));
    if (f.pages) venue.push(escapeHtml(String(f.pages)));
    if (venue.length) parts.push(venue.join(", "));
    if (f.year) parts.push(escapeHtml(String(f.year)));

  // 还原 ​CITE i​ 占位为上标链接，并按首次出现给已知 key 编号、追加参考文献表
  let lastBibOrder = []; // lastBibOrder[n-1] = 编号为 n 的 key（供文献表回链跳转用）
  function renderCitations(html, citeList, bibDB) {
    if (!citeList || !citeList.length) { lastBibOrder = []; return html; }
    const num = new Map(); let next = 1; const order = [];
    citeList.forEach((c) => c.keys.forEach((k) => {

    let bib = '<section class="bibliography" id="refs"><h2>' + escapeHtml(t("references")) +

    order.forEach((k) => {
      const n = num.get(k);

  // 代码块懒高亮：IntersectionObserver 只对进入视口(含 200px 预判区)的 pre code 调 hljs。

  let hljsObserver = null;

  // 数学公式无法像文字自动换行，故用缩放保证整式可见、右侧不被裁切。
  // 超长 display 公式：优先按顶层运算符(= + -)折行重渲为多行 gathered，把溢出部分放到下一行；
  // 无法断行(如纯长分数)才回退到等比缩小。数学公式本身不能像文字自动换行，此处按运算符断点近似折行。

  // 贪心：把 tex 在顶层运算符处切成段，逐段累加，超宽即断行，生成 gathered 多行 tex。
  function wrapTexToFit(tex, maxWidth, measure) {
    const ops = [];

    for (let i = 0; i < tex.length; i++) {

    if (!ops.length) return null;
    const segs = [];
    let last = 0;
    for (const op of ops) { segs.push(tex.slice(last, op)); last = op; }
    segs.push(tex.slice(last));

      if (!cur || widthOf(trial) <= maxWidth) cur = trial;
      else { lines.push(cur); cur = seg; }
    }
    if (cur) lines.push(cur);

  function wrapDisplayMath(root) {

      if (kd.scrollWidth <= visible + 1) {

  let previewDirty = false;

  /* ---------- mermaid（流程图/时序图等）----------
     ```mermaid 代码块在 render() 里预渲染为 SVG，写回 html 字符串——这样实时预览、

        .then((r) => '<div class="mermaid-wrap">' + (r && r.svg ? r.svg : "") + "</div>")

  async function render(force) {

    // 还原引用占位为 [n] 上标，并追加「参考文献」表（单次正则，见 BUG-011）
    html = renderCitations(html, citeList, bibDB);

    // mermaid 预渲染（异步）：把 ```mermaid 代码块替换为 SVG，写入 html 字符串。
    // 代际守卫：await 后若已有更新的 render 启动，丢弃本次结果，避免覆盖新内容。
    const myGen = ++renderGen;
    html = await renderMermaidInHtml(html);
    if (myGen !== renderGen) return;
    renderIntoPreview(html);
  }
  // HTML 模式：用 KaTeX auto-render 渲染 $...$ / $$...$$（HTML 里公式是字面量，不像 MD 模式已预渲染）
  function renderMathAuto(root) {
    if (window.renderMathInElement) {
      try {
        renderMathInElement(root, {
          delimiters: [{ left: "$$", right: "$$", display: true }, { left: "$", right: "$", display: false }],
          throwOnError: false,
        });
      } catch (e) {}
    }
  }
  // 把已构建好的完整 HTML 挂进预览：大文档虚拟化、小文档全量；含代码高亮/公式折行/图片解析。
  // Markdown 与 HTML 两种模式最终都走这里。
  function renderIntoPreview(html) {
    // 表格统一包一层 .table-wrap：窄表居中、宽表横向滚动（CSS 见 #preview .table-wrap）。
    // marked 不输出嵌套 <table>，非贪婪匹配即安全；bibliography 用 <ol>，不会误伤。
    if (html.indexOf("<table") !== -1)
      html = html.replace(/<table(\s[^>]*)?>[\s\S]*?<\/table>/g,
        (m) => '<div class="table-wrap">' + m + "</div>");
    lastFullHtml = html; // 供 PDF 导出取用完整 HTML，不依赖预览 DOM（虚拟化时预览只挂可见块）
    // 大文档虚拟化：只挂可见块；小文档全量渲染。用一次 template 解析同时完成块计数与切分。
    const tpl = document.createElement("template");
    tpl.innerHTML = html;
    // 给每个顶层块打上 data-src-offset（源码偏移量），供点击定位用
    const children = Array.from(tpl.content.children);
    for (let i = 0; i < children.length && i < srcBlockOffsets.length; i++) {
      children[i].setAttribute("data-src-offset", srcBlockOffsets[i]);
    }
    const blockCount = children.length;
    if (blockCount > VIRT_THRESHOLD) {
      const keepScroll = preview.scrollTop;
      vClear();
      vSetup(tpl);          // 复用已解析的 template，不再二次解析
      preview.scrollTop = Math.min(keepScroll, vprefix[vblocks.length] - (preview.clientHeight || 0));
      renderVisible();
    } else {
      vClear();
      preview.innerHTML = html;
      // 非虚拟化：直接在 DOM 上标记 data-src-offset（template 上的标记不会随 innerHTML 带过来）
      const pvChildren = preview.children;
      for (let i = 0; i < pvChildren.length && i < srcBlockOffsets.length; i++) {
        pvChildren[i].setAttribute("data-src-offset", srcBlockOffsets[i]);
      }
      // 代码高亮：懒加载——只高亮进入视口的代码块（IntersectionObserver）。
      highlightCodeLazy();
      wrapDisplayMath(preview);
      // HTML 模式：渲染 $...$ 数学公式（MD 模式已在 html 字符串里预渲染，不需要）
      const at = activeTab();
      if (at && at.type === "html") renderMathAuto(preview);
      if (isTauri && at) resolveImages(preview, at.dir || "");
    }
    updateStats();
    $("rs").textContent = t("rendered");
  }

  /* ---------- 预览虚拟化（大文档）---------- */
  // 仅把可见区域（含缓冲）的块挂进 DOM，上下用 spacer 撑出总高度，滚动时按需切换可见块。
  // 这样预览 DOM 节点数与文档大小无关，只随可见区域变化——大文档也能丝滑滚动与即时编辑。
  // 小文档（块数 ≤ 阈值）走原 innerHTML 全量渲染，避免滚动条估算误差。
  const VIRT_THRESHOLD = 200;
  let lastFullHtml = "";       // 最近一次完整渲染的 HTML（供 PDF 导出使用，不依赖预览 DOM）
  let vblocks = [];            // 块 DOM 节点数组（来自 template 解析，未挂载到预览）
  let vheights = [];           // 每块高度：实测缓存，否则估算
  let vprefix = [0];           // 前缀和，vprefix[i] = 前 i 块高度之和
  let vRangeStart = -1, vRangeEnd = -1;
  let vScrollRaf = 0;
  let vSpacerTop = null, vContent = null, vSpacerBottom = null;

  // 按节点结构粗略估算块高度（px）。实测后会缓存真实值覆盖。避免对每块做 outerHTML 序列化。
  function estimateFromNode(el) {
    const tag = el.tagName;
    if (tag === "H1") return 52;
    if (tag === "H2") return 42;
    if (tag === "H3") return 34;
    if (tag === "H4" || tag === "H5" || tag === "H6") return 30;
    if (tag === "HR") return 24;
    if (tag === "PRE") return 40 + Math.max(1, (el.textContent.match(/\n/g) || []).length) * 18;
    if (tag === "UL" || tag === "OL") return 20 + Math.max(1, el.querySelectorAll("li").length) * 28;
    if (tag === "TABLE") return 20 + Math.max(1, el.querySelectorAll("tr").length) * 30;
    if (tag === "BLOCKQUOTE") return 36 + Math.max(1, el.querySelectorAll("p").length) * 28;
    const lines = el.querySelectorAll("p,br").length;
    const tlen = (el.textContent || "").length;
    return 28 + Math.max(1, lines) * 26 + (tlen > 200 ? Math.floor((tlen - 200) / 40) * 24 : 0);
  }
  function vRecomputePrefix() {
    vprefix = [0];
    for (let i = 0; i < vblocks.length; i++) vprefix.push(vprefix[i] + vheights[i]);
  }
  // 用已解析的 template 初始化虚拟化结构（复用 render() 的解析结果，不再二次解析）
  function vSetup(tpl) {
    vblocks = Array.from(tpl.content.children);
    vheights = vblocks.map(estimateFromNode);
    vRecomputePrefix();
    vRangeStart = vRangeEnd = -1;
    // 建立 spacer / content 三段结构
    vSpacerTop = document.createElement("div");
    vContent = document.createElement("div");
    vContent.className = "vcontent";
    vSpacerBottom = document.createElement("div");
    preview.appendChild(vSpacerTop);
    preview.appendChild(vContent);
    preview.appendChild(vSpacerBottom);
  }
  function vClear() {
    if (hljsObserver) { hljsObserver.disconnect(); }
    preview.innerHTML = ""; // 清空所有内容（全量 html 或 spacer 结构），避免模式切换时残留
    vSpacerTop = vContent = vSpacerBottom = null;
    vblocks = []; vheights = []; vprefix = [0]; vRangeStart = vRangeEnd = -1;
  }
  function renderVisible() {
    if (!vblocks.length || !vContent) return;
    const st = preview.scrollTop;
    const ch = preview.clientHeight || 600;
    const buf = 320;
    let s = 0;
    while (s < vblocks.length && vprefix[s + 1] <= st - buf) s++;
    let e = s;
    while (e < vblocks.length && vprefix[e] < st + ch + buf) e++;
    if (e <= s) e = Math.min(vblocks.length, s + 1);
    if (s === vRangeStart && e === vRangeEnd) return;
    vRangeStart = s; vRangeEnd = e;
    vSpacerTop.style.height = vprefix[s] + "px";
    vContent.innerHTML = "";
    const frag = document.createDocumentFragment();
    for (let i = s; i < e; i++) frag.appendChild(vblocks[i].cloneNode(true));
    vContent.appendChild(frag);
    vSpacerBottom.style.height = (vprefix[vblocks.length] - vprefix[e]) + "px";
    // 先缩放超长公式（会改变其高度），再实测块高度，避免高度缓存失真
    wrapDisplayMath(vContent);
    // 实测可见块高度并回填缓存，修正滚动条
    let changed = false;
    const kids = vContent.children;
    for (let k = 0; k < kids.length; k++) {
      const idx = s + k;
      const h = kids[k].offsetHeight;
      if (h && Math.abs(h - vheights[idx]) > 1) { vheights[idx] = h; changed = true; }
    }
    if (changed) {
      vRecomputePrefix();
      vSpacerTop.style.height = vprefix[s] + "px";
      vSpacerBottom.style.height = (vprefix[vblocks.length] - vprefix[e]) + "px";
    }
    // 高亮可见代码块（已可见，无需懒加载）
    if (window.hljs) {
      vContent.querySelectorAll("pre code:not([data-hl])").forEach((el) => {
        el.setAttribute("data-hl", "1");
        try { hljs.highlightElement(el); } catch (_) {}
      });
    }
    const at = activeTab();
    // HTML 模式：渲染可见区的 $...$ 数学公式
    if (at && at.type === "html") renderMathAuto(vContent);
    if (isTauri && at) resolveImages(vContent, at.dir || "");
    $("rs").textContent = t("rendered");
  }
  function scheduleRenderVisible() {
    if (vScrollRaf) return;
    vScrollRaf = requestAnimationFrame(() => { vScrollRaf = 0; renderVisible(); });
  }

  // 把容器内指向本地文件的 <img>（相对路径）按 .md 所在目录解析为 base64 data URL。
  function resolveImages(root, dir) {
    root.querySelectorAll("img").forEach((img) => {
      const src = img.getAttribute("src") || "";
      if (!src || /^(data:|https?:|blob:|asset:)/i.test(src)) return; // 已是可用源
      // 绝对路径（Unix / 开头 或 Windows 盘符 X:）直接用；相对路径按文档目录拼。
      // 草稿标签（未保存、dir 为空）拖入的图片是绝对路径，仍可读取渲染；
      // 此时相对路径无法解析则跳过，避免拼成 "/pic.png" 误读根路径（见 BUG-033）。
      const isAbs = src.charAt(0) === "/" || /^[A-Za-z]:[\\/]/.test(src);
      if (!isAbs && !dir) return;
      const abs = isAbs ? src : dir + "/" + src;
      if (abs in imgCache) { if (imgCache[abs]) img.src = imgCache[abs]; return; }
      imgCache[abs] = null; // 标记处理中，避免重复读取
      invoke("read_image_data_url", { path: abs })
        .then((url) => {
          if (typeof url === "string" && url.indexOf("data:") === 0) {
            imgCache[abs] = url;
            img.src = url;
          } else { delete imgCache[abs]; }
        })
        .catch(() => { delete imgCache[abs]; });
    });
  }

  function scheduleRender() {
    markDirty();
    $("rs").textContent = t("rendering");
    clearTimeout(renderTimer);
    // 大文档全量解析较重，用更长防抖避免连击卡顿；小文档保持 120ms 灵敏。
    const delay = editor.value.length > 60000 ? 450 : 120;
    renderTimer = setTimeout(render, delay);
    saveDraft();
  }

  /* ---------- 统计 ---------- */
  function updateStats() {
    const v = editor.value;
    const chars = v.length;
    const cn = (v.match(/[一-龥]/g) || []).length;
    const en = (v.replace(/[一-龥]/g, " ").match(/[A-Za-z0-9_]+/g) || []).length;
    const lines = v.split("\n").length;
    $("s-chars").textContent = chars + " " + t("chars");
    $("s-words").textContent = (cn + en) + " " + t("words");
    $("s-lines").textContent = t("lines") + " " + lines;
    $("wc").textContent = (cn + en) + " " + t("wUnit");
  }
  function updateCursor() {
    const p = editor.selectionStart;
    const before = editor.value.slice(0, p);
    $("s-cursor").textContent = t("lnCol").replace("{l}", before.split("\n").length).replace("{c}", p - before.lastIndexOf("\n"));
  }

  /* ---------- 编辑辅助 ---------- */
  function wrapSelection(before, after, ph) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    const sel = editor.value.slice(s, e) || ph;
    editor.value = editor.value.slice(0, s) + before + sel + (after || "") + editor.value.slice(e);
    const cs = s + before.length;
    editor.setSelectionRange(cs, cs + sel.length);
    editor.focus(); scheduleRender();
  }
  function linePrefix(prefix) {
    const s = editor.selectionStart, v = editor.value;
    const ls = v.lastIndexOf("\n", s - 1) + 1;
    editor.value = v.slice(0, ls) + prefix + v.slice(ls);
    editor.setSelectionRange(s + prefix.length, s + prefix.length);
    editor.focus(); scheduleRender();
  }
  function insertBlock(text, f, t) {
    const s = editor.selectionStart, v = editor.value;
    const nl = s > 0 && v[s - 1] !== "\n" ? "\n" : "";
    editor.value = v.slice(0, s) + nl + text + v.slice(s);
    const base = s + nl.length;
    editor.setSelectionRange(base + (f || 0), base + (t || 0));
    editor.focus(); scheduleRender();
  }

  const MD = {
    bold:   () => wrapSelection("**", "**", "加粗文本"),
    italic: () => wrapSelection("*", "*", "斜体文本"),
    strike: () => wrapSelection("~~", "~~", "删除线"),
    code:   () => wrapSelection("`", "`", "code"),
    h1:     () => linePrefix("# "),
    h2:     () => linePrefix("## "),
    h3:     () => linePrefix("### "),
    quote:  () => linePrefix("> "),
    ul:     () => linePrefix("- "),
    ol:     () => linePrefix("1. "),
    task:   () => linePrefix("- [ ] "),
    link:   () => wrapSelection("[", "](https://)", "链接文字"),
    image:  () => pickImage(),
    table:  () => insertBlock("\n| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n| A | B | C |\n| D | E | F |\n", 0, 0),
    formula:() => insertBlock("\n$$\nE = mc^2\n$$\n", 5, 5),
    hr:     () => insertBlock("\n---\n", 0, 0),
  };
  document.querySelectorAll("[data-md]").forEach((b) =>
    b.addEventListener("click", () => MD[b.dataset.md] && MD[b.dataset.md]()));

  /* ---------- 文件名 / 视图 ---------- */
  function setFileName(name) {
    const tab = activeTab();
    const n = name || t("untitled");
    if (tab) tab.name = n;
    document.title = n + " — MDeX";
    renderTabs();
  }
  // 视图模式轮换按钮：分屏 → 仅编辑 → 仅预览 → 分屏
  const VIEW_MODES = ["split", "editor", "preview"];
  let curViewMode = "split";
  function refreshViewLabel() {
    const vm = $("view-mode");
    if (!vm) return;
    vm.textContent = curViewMode === "split" ? t("split")
      : curViewMode === "editor" ? t("editorOnly") : t("previewOnly");
  }
  function setViewMode(mode) {
    clearColSel();
    const wasEditor = curViewMode === "editor";
    curViewMode = mode;
    main.classList.remove("view-split", "view-editor", "view-preview");
    main.classList.add("view-" + mode);
    refreshViewLabel();
    // 从「仅编辑」切回含预览的视图，且预览曾被跳过时，补一次渲染
    if (wasEditor && mode !== "editor" && previewDirty) render();
  }
  $("view-mode").addEventListener("click", () => {
    const idx = VIEW_MODES.indexOf(curViewMode);
    setViewMode(VIEW_MODES[(idx + 1) % VIEW_MODES.length]);
  });

  function toggleTheme() {
    const dark = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", dark);
    try { localStorage.setItem("md-theme", dark ? "dark" : "light"); } catch (_) {}
    refreshDynamicLabels();
    // mermaid 主题跟随：重新初始化并重渲（SVG 配色是渲染时烘焙的，需重渲才更新）
    initMermaid();
    scheduleRender();
  }
  $("theme-btn").addEventListener("click", toggleTheme);
  $("sync-btn").addEventListener("click", () => {
    syncScroll = !syncScroll;
    refreshDynamicLabels();
  });

  /* ---------- 文件操作 ---------- */
  function dirOf(p) { const i = p.lastIndexOf("/"); return i >= 0 ? p.slice(0, i) : ""; }
  function baseName(p) { const i = p.lastIndexOf("/"); return i >= 0 ? p.slice(i + 1) : p; }

  /* ---------- 多标签页 ---------- */
  // 示例文档版本：模板内容有实质改动时 bump。启动恢复会话时，自动把过期的示例标签
  // 内容刷新为最新模板（仅限带 sample 标记且未另存为文件的标签；用户自有文档永不触碰）。
  const SAMPLE_VER = 1;
  function createTab(opts) {
    const tab = {
      id: nextId++,
      name: opts.name || t("untitled"),
      path: opts.path || "",
      dir: opts.dir || "",
      content: opts.content != null ? opts.content : "",
      type: opts.type || "md", // "md" | "html"：决定 render() 走 Markdown 还是 HTML 渲染
      bibText: opts.bibText || "", // 加载的 .bib 文献库内容（参考文献渲染用）
      sample: opts.sample || null, // {kind,ver}：标记为内置示例文档（cite/mermaid/mdex），便于模板更新后自动刷新
      dirty: false,
      scrollTop: 0,
      selStart: 0,
      selEnd: 0,
    };
    tabs.push(tab);
    return tab;
  }
  // 按文件名扩展名判定文档类型
  function fileTypeOf(name) {
    return /\.(html?|xhtml)$/i.test(name || "") ? "html" : "md";
  }

  function renderTabs() {
    const bar = $("tabs");
    bar.innerHTML = "";
    tabs.forEach((tab) => {
      const el = document.createElement("div");
      el.className = "tab" + (tab.id === activeId ? " active" : "");
      el.title = tab.path || tab.name;
      if (tab.dirty) {
        const dot = document.createElement("span");
        dot.className = "tab-dirty";
        el.appendChild(dot);
      }
      const name = document.createElement("span");
      name.className = "tab-name";
      name.textContent = tab.name;
      el.appendChild(name);
      const close = document.createElement("button");
      close.className = "tab-close";
      close.title = t("closeFile");
      close.textContent = "×";
      close.addEventListener("click", (e) => { e.stopPropagation(); closeTab(tab.id); });
      el.appendChild(close);
      el.addEventListener("click", () => switchTab(tab.id));
      el.addEventListener("mousedown", (e) => { if (e.button === 1) { e.preventDefault(); closeTab(tab.id); } });
      bar.appendChild(el);
    });
    updateEmptyState();
  }

  // 空状态切换：所有标签都关闭后，主区域不再自动新建「未命名」空白标签，
  // 改为显示居中提示「请打开或创建一个 Markdown 文件」；重新打开/新建文件时自动恢复。
  // 在 renderTabs 末尾调用，覆盖所有增删/切换/语言变更路径（renderTabs 是标签变更的统一收口）。
  function updateEmptyState() {
    const empty = tabs.length === 0;
    const mainEl = $("main");
    if (mainEl) mainEl.classList.toggle("no-tabs", empty);
    if (empty) {
      activeId = null;
      document.title = "MDeX";
      editor.value = "";
      const pv = $("preview");
      if (pv) pv.innerHTML = "";
    }
  }

  // 切换前把当前编辑器状态存回活动标签，再载入目标标签
  function switchTab(id) {
    if (id === activeId) return;
    const cur = activeTab();
    if (cur) {
      cur.content = editor.value;
      cur.scrollTop = editor.scrollTop;
      cur.selStart = editor.selectionStart;
      cur.selEnd = editor.selectionEnd;
    }
    activeId = id;
    loadTab(activeTab());
    renderTabs();
    saveDraft();
  }

  function loadTab(tab) {
    clearColSel();
    if (!tab) { editor.value = ""; updateStats(); updateCursor(); return; }
    editor.value = tab.content;
    editor.setSelectionRange(tab.selStart || 0, tab.selEnd || 0);
    document.title = tab.name + " — MDeX";
    // 延后一帧再渲染预览：先让编辑器文本绘制出来（大文件下用户立刻看到内容），
    // 随后才进入较重的预览渲染，避免打开时整窗卡住几秒。
    requestAnimationFrame(() => render());
    if (tab.scrollTop) editor.scrollTop = tab.scrollTop;
    updateCursor();
    // 切标签时同步文献库徽标条数
    {
      let n = 0;
      if (window.BibTeXParser && tab.bibText && tab.bibText.trim()) {
        try { n = ((window.BibTeXParser.parse(tab.bibText, { sentenceCase: false }) || {}).entries || []).length; } catch (e) {}
      }
      updateBibBadge(n);
    }
  }

  function markDirty() {
    const tab = activeTab();
    if (tab && !tab.dirty) { tab.dirty = true; renderTabs(); }
  }

  function newFile() {
    const tab = createTab({ content: "" });
    switchTab(tab.id);
    editor.focus();
  }

  // 未保存关闭确认弹窗。返回 "cancel" | "discard" | "save"。
  // 用自绘弹窗而非原生 confirm()：Tauri WKWebView 下 confirm() 行为不稳定，
  // 且三按钮（取消/不保存/保存）比浏览器二选一更符合编辑器习惯。
  function confirmCloseDialog() {
    return new Promise((resolve) => {
      const mask = $("confirm-mask");
      $("confirm-msg").textContent = t("confirmClose");
      $("confirm-cancel").textContent = t("cancel");
      $("confirm-discard").textContent = t("dontSave");
      $("confirm-save").textContent = t("save");
      mask.hidden = false;
      const done = (v) => { mask.hidden = true; cleanup(); resolve(v); };
      const onMask = (e) => { if (e.target === mask) done("cancel"); };
      const onKey = (e) => { if (e.key === "Escape") done("cancel"); };
      function cleanup() {
        $("confirm-cancel").onclick = null;
        $("confirm-discard").onclick = null;
        $("confirm-save").onclick = null;
        mask.removeEventListener("click", onMask);
        document.removeEventListener("keydown", onKey);
      }
      $("confirm-cancel").onclick = () => done("cancel");
      $("confirm-discard").onclick = () => done("discard");
      $("confirm-save").onclick = () => done("save");
      mask.addEventListener("click", onMask);
      document.addEventListener("keydown", onKey);
      $("confirm-discard").focus();
    });
  }

  async function closeTab(id) {
    const idx = tabs.findIndex((x) => x.id === id);
    if (idx < 0) return;
    const tab = tabs[idx];
    if (tab.dirty) {
      const choice = await confirmCloseDialog();
      if (choice === "cancel") return;
      if (choice === "save") {
        // 保存作用于被关闭的标签：先切到它，再走源文件保存
        if (activeId !== id) switchTab(id);
        const ok = await saveFile();
        if (!ok || tab.dirty) return; // 保存被取消/失败 → 不关闭
      }
    }
    tabs.splice(idx, 1);
    if (tab.path && isTauri) invoke("unregister_file", { path: tab.path }).catch(() => {});
    if (activeId === id) {
      if (tabs.length === 0) {
        // 最后一个标签已关闭：进入空状态（显示「请打开或创建…」提示），不再自动新建空白标签。
        activeId = null;
        loadTab(null);
      } else {
        activeId = tabs[Math.min(idx, tabs.length - 1)].id;
        loadTab(activeTab());
      }
    }
    renderTabs(); // → updateEmptyState() 显示空状态或恢复编辑区
    saveDraft();
  }

  // 工具栏/菜单「关闭」= 关闭当前标签

  async function openFile() {
    if (isTauri) {
      try {
        const data = await invoke("pick_and_read");
        if (data) {
          const path = data.path || "";
          const dup = path ? tabs.find((x) => x.path === path) : null;
          if (dup) { switchTab(dup.id); return; }
          const tab = createTab({
            name: data.name || t("untitled"),
            path,
            dir: dirOf(path),
            content: data.content,
            type: fileTypeOf(data.name),
          });
          switchTab(tab.id);
          toast(t("opened") + tab.name);
        }
      } catch (e) { toast(t("openFail") + e); }
    } else {
      fileInput.accept = ".md,.markdown,.txt,.html,.htm,text/markdown,text/plain,text/html";
      fileInput.onchange = () => { const f = fileInput.files[0]; if (f) readBrowser(f); fileInput.value = ""; };
      fileInput.click();
    }

  function readBrowser(file) {
    const r = new FileReader();
    r.onload = () => {
      const tab = createTab({ name: file.name, content: r.result, type: fileTypeOf(file.name) });
      switchTab(tab.id);
    };
    r.readAsText(file);
  }

  // 加载 .bib 文献库到当前标签（渲染 [@key] 引用与文末参考文献表）
  async function loadBib() {
    const tab = activeTab();
    if (!tab) return;
    let content = "";
    if (isTauri) {
      try {
        const data = await invoke("pick_and_read_bib");
        if (!data) return; // 用户取消
        content = data.content || "";
      } catch (e) { toast(t("bibLoadFail") + (e && e.message ? e.message : e)); return; }
    } else {
      const f = await new Promise((resolve) => {
        fileInput.accept = ".bib,.txt,text/x-bibtex";
        fileInput.onchange = () => { const x = fileInput.files[0]; fileInput.value = ""; resolve(x); };
        fileInput.click();
      });
      if (!f) return;
      content = await new Promise((resolve) => {
        const r = new FileReader(); r.onload = () => resolve(r.result); r.readAsText(f);
      });

    tab.bibText = content;
    // 预解析统计条目数（失败也保留文本，渲染时 parseBib 会再试）
    let n = 0;

      try { n = ((window.BibTeXParser.parse(content, { sentenceCase: false }) || {}).entries || []).length; }
      catch (e) { toast(t("bibLoadFail") + (e && e.message ? e.message : e)); }

    render();
    toast(t("bibLoaded").replace("{n}", String(n)));

  // 保存源文件。有路径就直写，无路径按 tab 类型走 md/html 另存为。
  // 返回是否真正落盘（用于关闭前保存：取消/失败则不关闭）。
  async function saveFile() {
    const tab = activeTab();
    if (!tab) return false;
    if (tab.path && isTauri) {
      try {
        await invoke("write_file_at", { path: tab.path, content: editor.value });
        tab.content = editor.value; tab.dirty = false; renderTabs(); toast(t("saved"));
        return true;
      } catch (e) { toast(t("saveFail") + e); return false; }
    }
    return tab && tab.type === "html" ? saveAsHtml() : saveAsMarkdown();
  }
  // 仅 Markdown 的另存为（保存/关闭前保存的回退路径）。会更新标签身份。
  async function saveAsMarkdown() {
    const tab = activeTab();
    if (!tab) return false;
    if (isTauri) {
      try {
        const path = await invoke("save_as", { content: editor.value, defaultName: tab.name });
        if (!path) return false; // 用户取消
        tab.path = path;
        tab.dir = dirOf(path);
        tab.name = baseName(path) || tab.name;
        tab.type = "md";
        tab.content = editor.value;
        tab.dirty = false;
        renderTabs();
        document.title = tab.name + " — MDeX";
        toast(t("saved"));
        return true;
      } catch (e) { toast(t("saveFail") + e); return false; }
    }
    const blob = new Blob([editor.value], { type: "text/markdown;charset=utf-8" });
    downloadBlob(blob, tab.name);
    tab.content = editor.value; tab.dirty = false; renderTabs();
    toast(t("downloaded") + tab.name);
    return true;
  }
  // 仅 HTML 的另存为（HTML 标签无路径时「保存」的回退）。会更新标签身份。
  async function saveAsHtml() {
    const tab = activeTab();
    if (!tab) return false;
    if (isTauri) {
      try {
        const base = (tab.name || t("untitled")).replace(/\.(md|markdown|tex|pdf|html?|txt)$/i, "");
        const path = await invoke("pick_save_path", { defaultName: base, format: "html" });
        if (!path) return false; // 用户取消

        tab.path = path; tab.dir = dirOf(path); tab.name = baseName(path) || tab.name;
        tab.type = "html"; tab.content = editor.value; tab.dirty = false;
        renderTabs(); document.title = tab.name + " — MDeX"; toast(t("saved"));

      } catch (e) { toast(t("saveFail") + e); return false; }

    downloadBlob(blob, tab.name);
    tab.content = editor.value; tab.dirty = false; renderTabs();
