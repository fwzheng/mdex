<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f6f8fa;
    --fg: #1f2328;
    --fg-muted: #656d76;
    --border: #d0d7de;
    --accent: #0969da;
    --accent-fg: #ffffff;
    --code-bg: #f6f8fa;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
    --radius: 8px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  html.dark {
    --bg: #0d1117;
    --bg-alt: #161b22;
    --fg: #e6edf3;
    --fg-muted: #8b949e;
    --border: #30363d;
    --accent: #2f81f7;
    --accent-fg: #ffffff;
    --code-bg: #161b22;
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- 工具栏 ---------- */
  .toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 12px; background: var(--bg-alt);
    border-bottom: 1px solid var(--border); flex-wrap: nowrap; min-height: 50px;
  }
  .toolbar .group { display: flex; gap: 2px; align-items: center; flex: none; }
  /* 格式按钮组：可收缩 + 横向滚动，窗口变窄时不把右侧控件挤到第二行 */
  .toolbar .group-fmt { flex: 0 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: thin; }
  .toolbar .group-fmt::-webkit-scrollbar { height: 4px; }
  .toolbar .group-fmt::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 6px; flex: none; }
  .toolbar .spacer { flex: 1; }
  /* ---------- 标签页 ---------- */
  .tabs { display: flex; gap: 3px; overflow-x: auto; flex: 1; min-width: 0;
    scrollbar-width: thin; padding: 1px 0; }
  .tabs::-webkit-scrollbar { height: 4px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tab {
    display: inline-flex; align-items: center; gap: 6px; padding-block: 4px; padding-inline: 10px 6px;
    border-radius: 6px; font-size: 12px; color: var(--fg-muted); cursor: default;
    white-space: nowrap; flex: 0 1 180px; min-width: 96px; transition: background .12s, color .12s;
  }
  .tab .tab-name { overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
  .tab:hover { background: var(--border); color: var(--fg); }
  .tab.active { background: var(--accent); color: var(--accent-fg); }
  .tab-dirty { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: none; }
  .tab.active .tab-dirty { background: var(--accent-fg); }
  .tab-close { appearance: none; border: 0; background: transparent; color: inherit;
    font-size: 15px; line-height: 1; padding: 0 4px; border-radius: 4px; cursor: default; opacity: .55; flex: none; }
  .tab-close:hover { opacity: 1; background: rgba(0,0,0,.12); }
  html.dark .tab-close:hover { background: rgba(255,255,255,.18); }

  .btn {
    appearance: none; border: 1px solid transparent; background: transparent;
    color: var(--fg); font-family: var(--sans); font-size: 13px; padding: 5px 9px;
    border-radius: 6px; cursor: default; display: inline-flex; align-items: center;
    justify-content: center; gap: 5px; line-height: 1; white-space: nowrap; transition: background .12s;
  }
  .btn:disabled, .btn[disabled] { opacity: .38; cursor: default; pointer-events: none; }
  .btn:hover { background: var(--border); }
  .btn:active { background: var(--accent); color: var(--accent-fg); }
  .btn.icon { padding: 5px 8px; font-weight: 600; min-width: 30px; }
  .btn.primary { background: var(--accent); color: var(--accent-fg); }
  .btn.primary:hover { filter: brightness(1.08); background: var(--accent); }
  .btn.active { background: var(--accent); color: var(--accent-fg); }
  select.btn { padding-inline-end: 9px; text-align: center; text-align-last: center; }

  /* ---------- 主区域 ---------- */
  .main { flex: 1; display: grid; grid-template-columns: 1fr 5px 1fr; min-height: 0; }
  .main.view-editor { grid-template-columns: 1fr 0 0; }
  .main.view-preview { grid-template-columns: 0 0 1fr; }
  .gutter { background: var(--border); cursor: col-resize; transition: background .15s; }
  .gutter:hover, .gutter.dragging { background: var(--accent); }
  .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
  .pane.collapsed { display: none; }
  /* 空状态：关闭所有标签后，主区域不再自动新建空白标签，
     改为居中显示「请打开或创建一个 Markdown 文件」提示。 */
  .empty-state {
    display: none; grid-column: 1 / -1;
    align-items: center; justify-content: center;
    text-align: center; color: var(--fg-muted);
    font-size: 15px; line-height: 1.9; user-select: none;
  }
  .empty-state .empty-icon { font-size: 40px; opacity: .45; margin-bottom: 14px; }
  .main.no-tabs > #pane-editor,
  .main.no-tabs > #gutter,
  .main.no-tabs > #pane-preview { display: none; }
  .main.no-tabs > .empty-state { display: flex; }
  .pane-head {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-muted);
    padding: 5px 16px; min-height: 38px; background: var(--bg-alt); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  #editor {
    flex: 1; width: 100%; border: 0; outline: 0; resize: none; padding: 20px 24px;
    font-family: var(--mono); font-size: 14px; line-height: 1.7;
    background: var(--bg); color: var(--fg); tab-size: 2;
    position: relative; z-index: 1;
  }
  #editor.colsel-active { caret-color: transparent; }
  /* 编辑器搜索高亮覆盖层：与 textarea 同字体/内边距/行高，叠在上方；文字透明，仅 <mark> 显底色 */
  .editor-area { position: relative; flex: 1; min-height: 0; display: flex; }
  #editor-hl {
    position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden;
    box-sizing: border-box; padding: 20px 24px; margin: 0; border: 0;
    font-family: var(--mono); font-size: 14px; line-height: 1.7; tab-size: 2;
    white-space: pre-wrap; word-break: break-word; color: transparent;
  }
  #editor-hl mark.search-mark { background: rgba(255, 213, 79, .45); color: transparent; border-radius: 2px; }
  #editor-hl mark.search-mark.current { background: rgba(255, 152, 0, .9); animation: search-flash .9s ease-out; }
  #preview mark.search-mark { background: rgba(255, 213, 79, .5); border-radius: 2px; }
  #preview mark.search-mark.current { background: rgba(255, 152, 0, .85); animation: search-flash .9s ease-out; }
  @keyframes search-flash {
    0% { background: rgba(255, 82, 28, 1); } 35% { background: rgba(255, 152, 0, .85); }
    65% { background: rgba(255, 82, 28, 1); } 100% { background: rgba(255, 152, 0, .85); }
  }

  /* ---------- 搜索替换栏 ---------- */
  #search-bar { background: var(--bg-alt); border-bottom: 1px solid var(--border); padding: 6px 10px; flex: none; }
  #search-bar[hidden] { display: none; }
  .search-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
  .search-row:last-child { margin-bottom: 0; }
  .search-row input { flex: 1; min-width: 0; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 5px; background: var(--bg); color: var(--fg); font-size: 13px; outline: 0; }
  .search-row input:focus { border-color: var(--accent); }
  #search-count { font-size: 11px; color: var(--fg-muted); white-space: nowrap; min-width: 50px; text-align: center; }
  #search-bar .btn { padding: 3px 8px; font-size: 13px; }

  /* ---------- 预览 ---------- */
  #preview {
    flex: 1; overflow-y: auto; padding: 32px 40px 140px;
    background: var(--bg); line-height: 1.7; font-size: 16px;
  }
  #preview > *:first-child { margin-top: 0; }
  .vcontent > *:first-child { margin-top: 0; } /* 虚拟化：可见区首块去顶边距，与全量渲染一致 */
  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
    margin: 1.6em 0 .6em; font-weight: 600; line-height: 1.25; }
  #preview h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  #preview h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  #preview h3 { font-size: 1.25em; } #preview h4 { font-size: 1em; }
  #preview p { margin: 0 0 1em; text-align: justify; }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview strong { font-weight: 600; }
  #preview ul, #preview ol { margin: 0 0 1em; padding-inline-start: 2em; }
  #preview li + li { margin-top: .25em; }
  #preview blockquote { margin: 0 0 1em; padding: 0 1em; color: var(--fg-muted);
    border-inline-start: .25em solid var(--border); }
  #preview hr { border: 0; border-top: 1px solid var(--border); margin: 1.8em 0; }
  #preview code { font-family: var(--mono); font-size: .88em; background: var(--code-bg);
    padding: .2em .4em; border-radius: 5px; }
  #preview pre { background: var(--code-bg); padding: 14px 16px; border-radius: var(--radius);
    overflow-x: auto; margin: 0 0 1em; border: 1px solid var(--border); }
  #preview pre code { background: none; padding: 0; font-size: .85em; line-height: 1.5; }
  /* RTL（<html dir="rtl">，如阿拉伯语）：代码块 / 行内代码 / LaTeX 公式始终保持 LTR，
     作为独立双向"孤岛"不被整体镜像翻转——英文词、版本号(v1.3.1)等由 Unicode 双向算法
     天然在 RTL 段落内保持 LTR，无需额外处理。
     选择器含 #preview/.katex，buildStandaloneHtml 导出时会随样式一并收集，故导出文档同样生效。 */
  html[dir="rtl"] #preview pre,
  html[dir="rtl"] #preview code,
  html[dir="rtl"] #preview .katex,
  html[dir="rtl"] #preview .katex-display,
  html[dir="rtl"] .help-body pre,
  html[dir="rtl"] .help-body code { direction: ltr; unicode-bidi: isolate; text-align: start; }
  /* RTL：方向性图标（左右箭头、侧边栏折叠等）水平镜像；给元素加 .rtl-mirror 即生效。
     当前界面无此类图标，留作扩展钩子。 */
  html[dir="rtl"] .rtl-mirror { transform: scaleX(-1); }
  #preview img { max-width: 100%; border-radius: var(--radius); }
  /* 图片与表格默认居中：所有「含图片」的段落/列表项/单元格/引用整体居中，
     不再用 only-child，避免「有的居中、有的靠左」的混排（所有含图块一律居中）。 */
  #preview p:has(img),
  #preview li:has(img),
  #preview td:has(img),
  #preview blockquote:has(img) { text-align: center; }
  /* 表格由 renderIntoPreview 包一层 .table-wrap：窄表按内容居中，宽表在容器内横向滚动 */
  #preview table { border-collapse: collapse; margin: 0 0 1em; }
  #preview .table-wrap { overflow-x: auto; margin: 0 0 1em; }
  #preview .table-wrap > table { display: table; margin: 0 auto; width: auto; }
  /* mermaid 图：包一层 .mermaid-wrap，居中、宽图横向滚动；错误回退为代码块 */
  #preview .mermaid-wrap { margin: 0 0 1em; text-align: center; overflow-x: auto; }
  #preview .mermaid-wrap > svg { max-width: 100%; height: auto; cursor: zoom-in; }
  #preview .mermaid-err { color: #d33; font-family: var(--mono); font-size: .85em; text-align: start;
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 13px; }
  #preview th { background: var(--bg-alt); font-weight: 600; }
  #preview tr:nth-child(2n) { background: var(--bg-alt); }
  #preview li:has(> input[type="checkbox"]) { list-style: none; margin-inline-start: -1.2em; }
  #preview li input[type="checkbox"] { margin: 0; margin-inline-end: .5em; }
  #preview .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
  .mdmath { display: block; } /* display 公式容器（包 .katex-display），便于折行重渲 */
  /* 超长 display 公式：wrapDisplayMath() 优先在顶层 = + - 处折行重渲为多行（gathered），
     把溢出部分放到下一行；无法断行时才回退到等比缩小。*/

  /* ---------- 状态栏 ---------- */
  .statusbar { display: flex; align-items: center; gap: 14px; padding: 4px 16px;
    font-size: 11px; color: var(--fg-muted); background: var(--bg-alt);
    border-top: 1px solid var(--border); }
  .statusbar .right { margin-inline-start: auto; display: flex; gap: 14px; }

  /* ---------- 拖拽遮罩 ---------- */
  .dropmask { position: fixed; inset: 0; background: rgba(9,105,218,.12);
    border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center;
    z-index: 50; font-size: 18px; color: var(--accent); font-weight: 600; pointer-events: none; }
  body.dragging .dropmask { display: flex; }

  /* ---------- Toast ---------- */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--fg); color: var(--bg); padding: 9px 18px; border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity .2s, transform .2s; z-index: 100; pointer-events: none;
    box-shadow: var(--shadow); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- PDF 导出进度（非阻塞浮标）---------- */
  #pdf-progress { position: fixed; inset-inline-end: 18px; bottom: 56px; background: var(--fg); color: var(--bg);
    padding: 9px 16px; border-radius: 8px; font-size: 13px; box-shadow: var(--shadow); z-index: 150;
    display: none; align-items: center; gap: 9px; pointer-events: none; }
  #pdf-progress.show { display: flex; }
  #pdf-progress .spin { width: 12px; height: 12px; border: 2px solid var(--bg);
    border-top-color: transparent; border-radius: 50%; animation: pdf-spin 0.8s linear infinite; }
  @keyframes pdf-spin { to { transform: rotate(360deg); } }

  /* ---------- 矢量 PDF：通过 Tauri 的 WebviewWindow::print() 触发系统打印对话框 ---------- */
  /* 调用 print_webview 前已把完整内容挂回预览；@media print 仅显示预览，文字/公式矢量输出。 */
  /* @page 设每页四周留白（wry 默认打印边距为 0，须靠 @page 补足上下左右页边距）。 */
  @page { margin: 10mm 12mm; }
  @media print {
    html, body { height: auto !important; background: #fff !important; }
    .toolbar, .statusbar, .pane-head, #pane-editor, .gutter, #pdf-progress,
    .dropmask, .modal-mask { display: none !important; }
    .main { display: block !important; grid-template-columns: none !important; }
    #pane-preview { display: block !important; }
    #preview {
      overflow: visible !important; height: auto !important; padding: 0 !important;
      background: #fff !important; color: #000 !important;
    }
    #preview pre, #preview code, #preview table th { background: #f6f8fa !important; color: #000 !important; }
    /* 块内不分页：公式/代码/表格/列表项整体保持，避免切断 */
    #preview > * { page-break-inside: avoid; break-inside: avoid; }
    .katex-display { page-break-inside: avoid; break-inside: avoid; }
    .vcontent > * { page-break-inside: avoid; break-inside: avoid; }
  }

  /* ---------- 关闭确认弹窗 ---------- */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-mask[hidden] { display: none; }
  .modal-card {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); padding: 20px 22px;
    min-width: 320px; max-width: 440px; font-size: 14px;
  }
  .modal-msg { margin-bottom: 16px; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-actions .btn { padding: 6px 14px; }
  /* 格式/分辨率选择：按钮多，需换行居中、卡片加宽，避免首项被挤出可视区 */
  .choice-card { max-width: 600px; }
  .choice-actions { flex-wrap: wrap; justify-content: center; gap: 8px 10px; }
  .choice-actions .btn { padding: 7px 14px; }

  /* ---------- 帮助弹窗（宽、可滚动）---------- */
  .help-card { max-width: 760px; width: 92vw; max-height: 84vh; padding: 0; overflow: hidden;
    display: flex; flex-direction: column; }
  .help-head { display: flex; justify-content: space-between; align-items: center;
    padding: 13px 18px; border-bottom: 1px solid var(--border); flex: none; }
  .help-head .help-title { font-weight: 600; font-size: 15px; }
  .help-close { appearance: none; border: 0; background: transparent; color: var(--fg-muted);
    font-size: 22px; line-height: 1; cursor: default; padding: 0 6px; border-radius: 6px; }
  .help-close:hover { background: var(--border); color: var(--fg); }
  .help-body { padding: 18px 24px 24px; overflow-y: auto; line-height: 1.65; font-size: 14px; }
  .help-body h2 { margin: 1.4em 0 .5em; font-size: 1.05em; font-weight: 600;
    padding-bottom: .25em; border-bottom: 1px solid var(--border); }
  .help-body h2:first-child { margin-top: 0; }
  .help-body p { margin: 0 0 .7em; }
  .help-body .pron-line { font-size: 1.1em; background: var(--code-bg); padding: .5em .8em;
    border-radius: 6px; margin: 0 0 1em; }
  .help-body .pron-line code { font-size: 1em; background: none; padding: 0; }
  .help-body .help-links { margin-top: -.3em; font-size: .92em; color: var(--fg-muted); }
  .help-body .help-links a { color: var(--accent); }
  .help-body ul, .help-body ol { margin: 0 0 .8em; padding-inline-start: 1.6em; }
  .help-body li + li { margin-top: .2em; }
  .help-body code { font-family: var(--mono); font-size: .88em; background: var(--code-bg);
    padding: .12em .35em; border-radius: 4px; }
  .help-body pre { background: var(--code-bg); padding: 12px 14px; border-radius: 6px;
    overflow-x: auto; margin: 0 0 .9em; border: 1px solid var(--border); }
  .help-body pre code { background: none; padding: 0; font-size: .85em; }
  .help-body table { border-collapse: collapse; margin: 0 0 .9em; }
  .help-body th, .help-body td { border: 1px solid var(--border); padding: 5px 12px; text-align: start; }
  .help-body th { background: var(--bg-alt); font-weight: 600; }
  .help-body .contact { margin-top: 1em; padding: 12px 16px; background: var(--bg-alt);
    border: 1px solid var(--border); border-radius: 8px; }
  .help-body .contact .name { font-weight: 600; }
  .help-body .contact a { color: var(--accent); }

  /* ---------- Mermaid 图查看器（点击渲染区 mermaid 图 → 大图弹窗，缩放/平移/全屏）----------
     沿用 .modal-mask 模式（自绘弹窗，见 bug_history BUG-006：Tauri WKWebView 不用原生 alert/confirm）。
     z-index 高于普通 modal(200)。缩放走【改 SVG 的 width/height】让浏览器按新尺寸重绘矢量（放大不糊），
     而非 transform:scale（会把图层按原尺寸栅格化再 GPU 拉伸纹理→模糊）；平移用 transform:translate
     （只移动不拉伸纹理，保持清晰），不依赖原生滚动条（见 bug_history BUG-015）。全屏走 Tauri 窗口
     setFullscreen（系统级；WKWebView 下 Element.requestFullscreen 不可靠），见查看器 IIFE。 */
  .mv-mask { z-index: 300; background: rgba(0,0,0,.6); }
  .mv-mask[hidden] { display: none; } /* BUG-058：设了 display 必须 [hidden] 高特异性盖回，否则 hidden 失效 */
  .mv-card { background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); width: 92vw; height: 88vh; max-width: 1400px;
    padding: 0; overflow: hidden; display: flex; flex-direction: column; }
  .mv-head { display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 10px 12px; border-bottom: 1px solid var(--border); flex: none; }
  .mv-title { font-weight: 600; font-size: 14px; color: var(--fg-muted); padding-inline-start: 4px; }
  .mv-tools { display: flex; align-items: center; gap: 4px; }
  .mv-zoom { font-size: 12px; color: var(--fg-muted); min-width: 44px; text-align: center; font-family: var(--mono); }
  .mv-close { font-size: 20px; line-height: 1; }
  .mv-stage { position: relative; flex: 1; min-height: 0; overflow: hidden;
    background: var(--bg-alt); cursor: grab; touch-action: none; }
  .mv-stage.mv-dragging { cursor: grabbing; }
  .mv-content { position: absolute; top: 0; left: 0; will-change: transform; }
  .mv-content svg { display: block; max-width: none; max-height: none; shape-rendering: geometricPrecision; }
  .mv-content img { display: block; max-width: none; max-height: none; }
  /* 全屏：Tauri 窗口 setFullscreen 使整个 OS 窗口全屏，遮罩本就 inset:0 自动铺满。
     .mv-fs 标记当前查看器全屏态（按钮标题据此切换）；:fullscreen 规则留给 DOM Fullscreen API 回退路径。 */
  .mv-card:fullscreen, .mv-card:-webkit-full-screen { width: 100vw; height: 100vh; max-width: none;
    border-radius: 0; border: 0; }
  .mv-card:fullscreen .mv-stage, .mv-card:-webkit-full-screen .mv-stage { background: var(--bg); }
  .mv-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--fg-muted); background: var(--bg); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 12px; pointer-events: none; opacity: .85; white-space: nowrap; }
  /* mermaid 查看器作为独立 OS 窗口时（html.mv-win）：隐藏编辑器 UI，查看器卡片铺满整个窗口 */
  html.mv-win .toolbar,
  html.mv-win .main,
  html.mv-win .statusbar,
  html.mv-win .empty-state { display: none !important; }
  html.mv-win .mv-mask { background: var(--bg); z-index: auto; }
  html.mv-win .mv-card { width: 100vw; height: 100vh; max-width: none; border-radius: 0; border: 0; box-shadow: none; }

  /* ---------- 编辑区/预览区字体缩放控件（pane-head 右侧 −/百分比/+，各自独立）---------- */
  .pane-head-right { display: flex; align-items: center; gap: 10px; }
  .zoom-ctl { display: inline-flex; align-items: center; gap: 2px; }
  .zoom-ctl .btn { padding: 1px 7px; min-width: 22px; font-size: 15px; line-height: 1.4; border-radius: 5px; }
  .zoom-ctl .zlvl { font-size: 11px; color: var(--fg-muted); min-width: 36px; text-align: center;
    cursor: pointer; user-select: none; text-transform: none; letter-spacing: 0; }
  .zoom-ctl .zlvl:hover { color: var(--fg); }

  /* ---------- 导出 PDF 的离屏捕获容器 ---------- */
  /* 作为「一页高度的裁剪窗口」：固定 A4 宽（96dpi ≈ 794px）、白底黑字、复制 #preview 排版；
     内层用 transform 上移逐页截取。padding 放内层，本容器只负责裁剪。 */
  .pdf-capture {
    position: fixed; left: -100000px; top: 0; width: 794px;
    background: #fff; color: #000; font-family: var(--sans); font-size: 14px; line-height: 1.7;
  }
  .pdf-capture h1,.pdf-capture h2,.pdf-capture h3,.pdf-capture h4,
  .pdf-capture h5,.pdf-capture h6 { margin: 1.2em 0 .5em; font-weight: 600; line-height: 1.25; }
  .pdf-capture h1 { font-size: 1.8em; border-bottom: 1px solid #ccc; padding-bottom: .2em; }
  .pdf-capture h2 { font-size: 1.4em; border-bottom: 1px solid #ddd; padding-bottom: .2em; }
  .pdf-capture h3 { font-size: 1.15em; }
  .pdf-capture p { margin: 0 0 .8em; text-align: justify; }
  .pdf-capture a { color: #0969da; }
  .pdf-capture ul,.pdf-capture ol { margin: 0 0 .8em; padding-inline-start: 2em; }
  .pdf-capture li + li { margin-top: .2em; }
  .pdf-capture blockquote { margin: 0 0 .8em; padding: 0 1em; color: #555; border-inline-start: .25em solid #ccc; }
  .pdf-capture hr { border: 0; border-top: 1px solid #ccc; margin: 1.4em 0; }
  .pdf-capture code { font-family: var(--mono); font-size: .88em; background: #f6f8fa; padding: .15em .35em; border-radius: 4px; }
  .pdf-capture pre { background: #f6f8fa; padding: 12px 14px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
  .pdf-capture pre code { background: none; padding: 0; font-size: .85em; }
  .pdf-capture img { max-width: 100%; }
  .pdf-capture p:has(img), .pdf-capture li:has(img),
  .pdf-capture td:has(img), .pdf-capture blockquote:has(img) { text-align: center; }
  .pdf-capture table { border-collapse: collapse; margin: 0 0 .8em; }
  .pdf-capture .table-wrap { overflow: visible; margin: 0 0 .8em; }
  .pdf-capture .table-wrap > table { display: table; margin: 0 auto; width: auto; }
  .pdf-capture .mermaid-wrap { margin: 0 0 .8em; text-align: center; overflow: visible; }
  .pdf-capture .mermaid-wrap > svg { max-width: 100%; height: auto; }
  .pdf-capture th,.pdf-capture td { border: 1px solid #ccc; padding: 5px 10px; }
  .pdf-capture th { background: #f0f0f0; }
  .pdf-capture .katex { font-size: 1.05em; }

  /* ---------- 文献引用（BibTeX）---------- */
  .cite { font-size: .75em; font-weight: 600; color: var(--accent); margin: 0 1px; white-space: nowrap; }
  .cite a { color: inherit; text-decoration: none; }

  .bib-back:hover { text-decoration: underline; }
  .cite-jump-list { display: flex; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; }
  .cite-jump-item {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: start;

  /* 📚 文献库按钮浮层（已加载时点按钮弹出：更换 / 卸载） */
  .bib-wrap { position: relative; display: inline-flex; }
  .bib-pop {
    position: absolute; top: calc(100% + 4px); inset-inline-end: 0; z-index: 50;
    min-width: 168px; padding: 4px; border-radius: 8px;
    background: var(--bg-alt); border: 1px solid var(--border);
    box-shadow: 0 6px 20px rgba(0,0,0,.15);
  }
  .bib-pop-item {
    display: block; width: 100%; text-align: start; padding: 7px 10px; margin: 0;
    border: 0; border-radius: 5px; background: transparent; color: var(--fg);
    font: inherit; font-size: 13px; cursor: pointer;
  }
  .bib-pop-item:hover { background: var(--border); }
  /* 文字颜色选择器（工具栏下拉色板） */
  .color-wrap { position: relative; display: inline-flex; }
  .color-pop {
    position: absolute; top: calc(100% + 4px); inset-inline-start: 0; z-index: 50;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
    padding: 7px; border-radius: 8px;

    box-shadow: 0 6px 20px rgba(0,0,0,.15);
  }
  .color-pop[hidden] { display: none; } /* display:grid 会盖过 UA 的 [hidden]，须显式让 hidden 生效，否则点按钮无反应 */
  .color-sw {
    width: 22px; height: 22px; padding: 0; border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer; transition: transform .08s;
  }
  .color-sw:hover { transform: scale(1.18); }
</style>

<script type="text/plain" id="cite-example-tpl-zh"># 文献引用示例

本示例演示 BibTeX 文献引用。文献库已**内嵌**在文末的 `bibtex` 代码块里，无需单独加载 .bib 即可渲染；也可删掉它改用工具栏「文献」按钮加载外部 .bib。

## 1. 基本引用

CRISPR-Cas9 基因编辑工具最初被报道 [@jinek2012]，随后发展出 SHERLOCK 检测平台 [@gootenberg2017]。

## 2. 多文献并列（分号分隔）

基因编辑与核酸检测两项突破 [@jinek2012; @gootenberg2017] 推动了分子生物学发展。

## 3. 带定位符

具体机制见 [@jinek2012, p. 816]。

## 4. 同一文献多次引用

SHERLOCK 平台 [@gootenberg2017] 在现场诊断中 [@gootenberg2017, p. 440] 多次被采用。

## 5. LaTeX 兼容写法

也可用传统 LaTeX 命令：\cite{lowe1999} 提出 SIFT 特征。

## 6. 未知文献

库中没有的 key 会渲染为问号 [@nonexistent2024]，类似 LaTeX 的 [?] 行为。

## 7. 多键带定位

多键并列并附定位符（定位符作用于整组）：[@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440]。

---

## 内嵌文献库（自包含，预览中不可见）

下面的 `bibtex` 块会被抽走去建文献库，预览区看不到它：

```bibtex
@article{gootenberg2017,
  author  = {Gootenberg, Jonathan S. and Abudayyeh, Omar O. and Lee, Winston and others},
  title   = {Highly multiplexed {RNA} detection with {SHERLOCK}},
  journal = {Science},
  year    = {2017},
  volume  = {360},
  number  = {6389},
  pages   = {439--444}
}
@article{jinek2012,
  author  = {Jinek, Martin and Chylinski, Krzysztof and Fonfara, Ines and Hauer, Michael and Doudna, Jennifer A.},
  title   = {A programmable dual-{RNA}-guided {DNA} endonuclease in adaptive bacterial immunity},
  journal = {Science},

<script type="text/plain" id="cite-example-tpl-pt"># Exemplo de citação bibliográfica

Este exemplo demonstra citações bibliográficas BibTeX. A base de referências está **embutida** no bloco de código `bibtex` no final do documento, pelo que não é necessário carregar um ficheiro .bib separado para a renderização; também pode removê-lo e carregar um ficheiro .bib externo através do botão «Referências» na barra de ferramentas.

<script type="text/plain" id="cite-example-tpl-ar"># مثال الاستشهاد المرجعي

يوضّح هذا المثال الاستشهاد المرجعي بصيغة BibTeX. قاعدة المراجع **مضمّنة** في كتلة الشيفرة `bibtex` في نهاية المستند، فلا حاجة لتحميل ملف .bib منفصل لإجراء العرض؛ كما يمكن حذفها واستخدام زر «المراجع» في شريط الأدوات لتحميل ملف .bib خارجي.

## 1. استشهاد أساسي

أُبلغ عن أداة تحرير الجينات CRISPR-Cas9 لأول مرة [@jinek2012]، ثم طُوّرت منصة الكشف SHERLOCK لاحقًا [@gootenberg2017].

## 2. مراجع متعددة متجاورة (مفصولة بفاصلة منقوطة)

دفعت إنجازات تحرير الجينات والكشف عن الأحماض النووية [@jinek2012; @gootenberg2017] عجلة تطور البيولوجيا الجزيئية.

## 3. مع مُحدِّد

للآلية المفصّلة راجع [@jinek2012, p. 816].

## 4. استشهاد متكرر بالمرجع نفسه

أُستخدمت منصة SHERLOCK [@gootenberg2017] في التشخيص الميداني [@gootenberg2017, p. 440] أكثر من مرة.

## 5. صيغة متوافقة مع LaTeX

يمكن أيضًا استخدام أوامر LaTeX التقليدية: اقترح \cite{lowe1999} ميزة SIFT.

## 6. مرجع غير معروف

أي key غير موجود في القاعدة يُعرض كعلامة استفهام [@nonexistent2024]، وهو سلوك مشابه لـ [?] في LaTeX.

## 7. مفاتيح متعددة مع مُحدِّد

مفاتيح متعددة متجاورة مع مُحدِّد (يُطبَّق المُحدِّد على المجموعة بأكملها): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

<script type="text/plain" id="cite-example-tpl-hi"># उद्धरण उदाहरण

यह उदाहरण BibTeX उद्धरण प्रदर्शित करता है। ग्रंथ-सूची दस्तावेज़ के अंत में `bibtex` कोड ब्लॉक में **अंतर्निहित** है, अतः रेंडर हेतु अलग .bib आवश्यक नहीं; आप इसे हटाकर टूलबार "संदर्भ" बटन से बाहरी .bib भी लोड कर सकते हैं।

## 1. मूल उद्धरण

CRISPR-Cas9 जीन-संपादन उपकरण पहले रिपोर्ट किया गया [@jinek2012], तत्पश्चात SHERLOCK पहचान प्लेटफ़ॉर्म विकसित हुआ [@gootenberg2017]।

## 2. एकाधिक संदर्भ (अर्ध-विराम से विभाजित)

दो सफलताएँ—जीन संपादन तथा न्यूक्लिक-अम्ल पहचान [@jinek2012; @gootenberg2017]—ने आण्विक जीवविज्ञान को आगे बढ़ाया।

## 3. निर्देशक (locator) सहित

विशिष्ट तंत्र के लिए [@jinek2012, p. 816] देखें।

## 4. एक ही संदर्भ के बार-बार उद्धरण

SHERLOCK प्लेटफ़ॉर्म [@gootenberg2017] का क्षेत्र-निदान में कई बार उपयोग हुआ [@gootenberg2017, p. 440]।

## 5. LaTeX-संगत सिंटैक्स

पारंपरिक LaTeX कमांड भी प्रयोग कर सकते हैं: \cite{lowe1999} ने SIFT विशेषताएँ प्रस्तुत कीं।

## 6. अज्ञात संदर्भ

पुस्तकालय में अनुपस्थित कुंजी प्रश्न-चिह्न की भाँति रेंडर होती है [@nonexistent2024], LaTeX के [?] व्यवहार के समान।

## 7. निर्देशक सहित एकाधिक कुंजी

निर्देशक सहित एकाधिक कुंजी (निर्देशक संपूर्ण समूह पर लागू): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440]।

---

## अंतर्निहित ग्रंथ-सूची (स्व-निहित, पूर्वावलोकन में छिपी)

नीचे `bibtex` ब्लॉक ग्रंथ-सूची बनाने निकाला जाता है, अतः पूर्वावलोकन क्षेत्र में दिखाई नहीं देता:

<script type="text/plain" id="cite-example-tpl-pa"># ਹਵਾਲਾ ਉਦਾਹਰਣ

ਇਹ ਉਦਾਹਰਣ BibTeX ਹਵਾਲਿਆਂ ਨੂੰ ਦਰਸਾਉਂਦੀ ਹੈ। ਗ੍ਰੰਥ-ਸੂਚੀ ਦਸਤਾਵੇਜ਼ ਦੇ ਅੰਤ ਵਿੱਚ `bibtex` ਕੋਡ ਬਲਾਕ ਵਿੱਚ **ਅੰਤਰੀਕ੍ਰਿਤ** ਹੈ, ਇਸ ਲਈ ਰੈਂਡਰ ਲਈ ਵੱਖਰੀ .bib ਨਹੀਂ ਚਾਹੀਦੀ; ਤੁਸੀਂ ਇਸਨੂੰ ਹਟਾ ਕੇ ਟੂਲਬਾਰ “ਹਵਾਲੇ” ਬਟਨ ਤੋਂ ਬਾਹਰੀ .bib ਵੀ ਲੋਡ ਕਰ ਸਕਦੇ ਹੋ।

## 1. ਮੂਲ ਹਵਾਲਾ

CRISPR-Cas9 ਜੀਨ-ਸੰਪਾਦਨ ਸੰਦ ਪਹਿਲਾਂ ਰਿਪੋਰਟ ਕੀਤਾ ਗਿਆ [@jinek2012], ਜਿਸ ਤੋਂ ਬਾਅਦ SHERLOCK ਖੋਜ ਪਲੇਟਫਾਰਮ ਵਿਕਸਿਤ ਹੋਇਆ [@gootenberg2017]।

## 2. ਕਈ ਹਵਾਲੇ (ਸੈਮੀ-ਕਾਲਨ ਨਾਲ ਵੱਖ)

ਦੋ ਸਫਲਤਾਵਾਂ—ਜੀਨ ਸੰਪਾਦਨ ਤੇ ਨਿਊਕਲੀਕ ਤੇਜ਼ਾਬ ਖੋਜ [@jinek2012; @gootenberg2017]—ਨੇ ਅਣੂ ਜੀਵ ਵਿਗਿਆਨ ਨੂੰ ਅੱਗੇ ਤੋਰਿਆ।

## 3. ਨਿਰਦੇਸ਼ਕ (locator) ਨਾਲ

ਖਾਸ ਤੰਤਰ ਲਈ [@jinek2012, p. 816] ਵੇਖੋ।

## 4. ਇੱਕੋ ਹਵਾਲੇ ਦੀ ਵਾਰ-ਵਾਰ ਵਰਤੋਂ

SHERLOCK ਪਲੇਟਫਾਰਮ [@gootenberg2017] ਖੇਤਰ ਜਾਂਚ ਵਿੱਚ ਕਈ ਵਾਰ ਵਰਤਿਆ ਗਿਆ [@gootenberg2017, p. 440]।

## 5. LaTeX-ਅਨੁਕੂਲ ਸਿੰਟੈਕਸ

ਪਾਰੰਪਰਿਕ LaTeX ਕਮਾਂਡ ਵੀ ਵਰਤ ਸਕਦੇ ਹੋ: \cite{lowe1999} ਨੇ SIFT ਵਿਸ਼ੇਸ਼ਤਾਵਾਂ ਪੇਸ਼ ਕੀਤੀਆਂ।

## 6. ਅਗਿਆਤ ਹਵਾਲਾ

ਲਾਇਬ੍ਰੇਰੀ ਵਿੱਚ ਗੈਰ-ਮੌਜੂਦ ਕੁੰਜੀ ਪ੍ਰਸ਼ਨ-ਚਿੰਨ੍ਹ ਵਾਂਗ ਰੈਂਡਰ ਹੁੰਦੀ ਹੈ [@nonexistent2024], LaTeX ਦੇ [?] ਵਰਤਾਰੇ ਵਾਂਗ।

## 7. ਨਿਰਦੇਸ਼ਕ ਨਾਲ ਕਈ ਕੁੰਜੀਆਂ

ਨਿਰਦੇਸ਼ਕ ਨਾਲ ਕਈ ਕੁੰਜੀਆਂ (ਨਿਰਦੇਸ਼ਕ ਪੂਰੇ ਸਮੂਹ ’ਤੇ ਲਾਗੂ): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440]।

---

## ਅੰਤਰੀਕ੍ਰਿਤ ਗ੍ਰੰਥ-ਸੂਚੀ (ਸਵੈ-ਨਿਹਿਤ, ਝਲਕ ਵਿੱਚ ਲੁਕੀ)

ਹੇਠਾਂ `bibtex` ਬਲਾਕ ਗ੍ਰੰਥ-ਸੂਚੀ ਬਣਾਉਣ ਲਈ ਕੱਢਿਆ ਜਾਂਦਾ ਹੈ, ਇਸ ਲਈ ਝਲਕ ਖੇਤਰ ਵਿੱਚ ਦਿਸਦਾ ਨਹੀਂ:

<script type="text/plain" id="cite-example-tpl-vi"># Ví dụ trích dẫn

Ví dụ này minh họa trích dẫn BibTeX. Danh mục tài liệu tham khảo được **nhúng** trong khối mã `bibtex` ở cuối tài liệu, nên không cần tệp .bib riêng để kết xuất; bạn cũng có thể xoá nó và dùng nút "Tài liệu tham khảo" trên thanh công cụ để nạp một .bib ngoài.

## 1. Trích dẫn cơ bản

Công cụ chỉnh sửa gen CRISPR-Cas9 được báo cáo lần đầu [@jinek2012], sau đó là nền tảng phát hiện SHERLOCK [@gootenberg2017].

## 2. Nhiều tài liệu (cách bằng dấu chấm phẩy)

Hai đột phá — chỉnh sửa gen và phát hiện axit nucleic [@jinek2012; @gootenberg2017] — đã thúc đẩy sinh học phân tử.

## 3. Có định vị

Xem [@jinek2012, p. 816] về cơ chế cụ thể.

## 4. Trích dẫn lặp lại

Nền tảng SHERLOCK [@gootenberg2017] đã được dùng nhiều lần trong chẩn đoán thực địa [@gootenberg2017, p. 440].

## 5. Cú pháp tương thích LaTeX

Bạn cũng có thể dùng lệnh LaTeX truyền thống: \cite{lowe1999} giới thiệu đặc trưng SIFT.

## 6. Trích dẫn không rõ

Một khoá không có trong thư viện kết xuất thành dấu hỏi [@nonexistent2024], giống hành vi [?] của LaTeX.

## 7. Nhiều khoá có định vị

Nhiều khoá có định vị (định vị áp dụng cho cả nhóm): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

---

<script type="text/plain" id="cite-example-tpl-id"># Contoh Kutipan

Dua terobosan — sunting gen dan deteksi asam nukleat [@jinek2012; @gootenberg2017] — telah memajukan biologi molekuler.

<script type="text/plain" id="cite-example-tpl-ur"># اقتباس کی مثال

یہ مثال BibTeX اقتباسات دکھاتی ہے۔ کتابیات دستاویز کے آخر میں `bibtex` کوڈ بلاک میں **شامل** ہے، اس لیے رینڈر کے لیے علیحدہ .bib درکار نہیں؛ آپ اسے ہٹا کر ٹول بار “حوالے” بٹن سے بیرونی .bib بھی لود کر سکتے ہیں۔

## 1. بنیادی اقتباس

CRISPR-Cas9 جین-ترمیم آلہ پہلے رپورٹ ہوا [@jinek2012]، اس کے بعد SHERLOCK پہچان پلیٹ فارم تشکیل پایا [@gootenberg2017]۔

## 2. متعدد حوالے (سیمیکولن سے جدا)

دو کامیابیاں — جین ترمیم اور نیوکلیک ایسڈ پہچان [@jinek2012; @gootenberg2017] — نے مالیکیولر بیالوجی کو آگے بڑھایا۔

## 3. مقام کے ساتھ

مخصوص میکانزم کے لیے [@jinek2012, p. 816] دیکھیں۔

## 4. ایک ہی حوالے کا بار بار اقتباس

SHERLOCK پلیٹ فارم [@gootenberg2017] میدانی تشخیص میں کئی بار استعمال ہوا [@gootenberg2017, p. 440]۔

## 5. LaTeX-ہم آہنگ نحو

روایتی LaTeX کمانڈ بھی استعمال کر سکتے ہیں: \cite{lowe1999} نے SIFT خصوصیات متعارف کرائیں۔

## 6. نامعلوم حوالہ

لائبریری میں غیر موجود کلید سوال نشان کی طرح رینڈر ہوتی ہے [@nonexistent2024]، LaTeX کے [?] رویے کی طرح۔

## 7. مقام کے ساتھ متعدد کلیڈ

مقام کے ساتھ متعدد کلیڈ (مقام پورے گروہ پر لاگو): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440]۔

---

## شامل کتابیات (خود کفیل، پیش نظارہ میں چھپی)

نیچے `bibtex` بلاک کتابیات بنانے کے لیے نکالا جاتا ہے، اس لیے پیش نظارہ علاقے میں نظر نہیں آتا:

```bibtex
@article{gootenberg2017,
  author  = {Gootenberg, Jonathan S. and Abudayyeh, Omar O. and Lee, Winston and others},
  title   = {Highly multiplexed {RNA} detection with {SHERLOCK}},
  journal = {Science},
  year    = {2017},
  volume  = {360},
  number  = {6389},
  pages   = {439--444}
}
@article{jinek2012,
  author  = {Jinek, Martin and Chylinski, Krzysztof and Fonfara, Ines and Hauer, Michael and Doudna, Jennifer A.},
  title   = {A programmable dual-{RNA}-guided {DNA} endonuclease in adaptive bacterial immunity},
  journal = {Science},
  year    = {2012},
  volume  = {337},
  pages   = {816--821}
}
@inproceedings{lowe1999,
  author    = {Lowe, David G.},
  title     = {Object recognition from local scale-invariant features},
  booktitle = {Proceedings of the IEEE International Conference on Computer Vision},
  year      = {1999},
  pages     = {1150--1157}
}
```

<script type="text/plain" id="cite-example-tpl-mn"># Эшлэлийн жишээ

Энэ жишээ нь BibTeX эшлэлийг харуулна. Номын сан баримтын төгсгөл дэх `bibtex` код блокт **шингээгдсэн** тул хөрвүүлэхэд тусдаа .bib шаардлагагүй; үүнийг устгаад багажны самбарын «Эх сурвалж» товчоор гадаад .bib ачаалж болно.

## 1. Үндсэн эшлэл

CRISPR-Cas9 генийн засварын багаж анх удаа нийтэд гарсан [@jinek2012], дараа нь SHERLOCK илрүүлэх платформ бүтээгдсэн [@gootenberg2017].

## 2. Олон эх сурвалж (цэг таслалаар тусгаарласан)

Хоёр амжилт — генийн засвар болон нуклейн хүчил илрүүлэх [@jinek2012; @gootenberg2017] — молекул биологийг урагшлуулсан.

## 3. Байршлын хамт

Тодорхой механизмыг [@jinek2012, p. 816]-аас үзнэ үү.

## 4. Нэг эх сурвалжийг давтан ишлэх

SHERLOCK платформ [@gootenberg2017] хээрийн оношилгоонд олон удаа ашиглагдсан [@gootenberg2017, p. 440].

## 5. LaTeX-тай нийцтэй бичиглэл

Уламжлалт LaTeX команд ч мөн ашиглаж болно: \cite{lowe1999} нь SIFT шинж чанарыг танилцуулсан.

## 6. Үл мэдэгдэх эх сурвалж

Санд байхгүй түлхүүр нь асуултын тэмдгээр хөрвүүлэгдэнэ [@nonexistent2024], LaTeX-ийн [?] зан үйл шиг.

## 7. Байршлын хамт олон түлхүүр

Байршлын хамт олон түлхүүр (байрлал бүхэл бүлэгт хамаарна): [@jinek2012; @gootenberg2017, p. 440] → [1, 2, p. 440].

---

## Шингээсэн номын сан (биеэ даасан, урьдчилан харах дахь нуугдсан)

Доорх `bibtex` блок номын сан байгуулахын тулд гаргагдсан тул урьдчилан харах талбарт харагдахгүй:

```bibtex
@article{gootenberg2017,
  author  = {Gootenberg, Jonathan S. and Abudayyeh, Omar O. and Lee, Winston and others},

  journal = {Science},
  year    = {2017},
  volume  = {360},
  number  = {6389},
  pages   = {439--444}
}
@article{jinek2012,
  author  = {Jinek, Martin and Chylinski, Krzysztof and Fonfara, Ines and Hauer, Michael and Doudna, Jennifer A.},
  title   = {A programmable dual-{RNA}-guided {DNA} endonuclease in adaptive bacterial immunity},
  journal = {Science},
  year    = {2012},
  volume  = {337},
  pages   = {816--821}
}
@inproceedings{lowe1999,
  author    = {Lowe, David G.},

```

<script type="text/plain" id="mermaid-example-tpl-zh"># Mermaid 图示例

<script type="text/plain" id="mermaid-example-tpl-ru"># Пример диаграмм Mermaid

<script type="text/plain" id="mermaid-example-tpl-hi"># Mermaid आरेख उदाहरण

यह उदाहरण विविध Mermaid आरेख प्रदर्शित करता है। Markdown में केवल <code>```mermaid</code> कोड ब्लॉक प्रयोग करें; पूर्वावलोकन इसे स्वतः SVG रेंडर करता है। कोड संपादित करने से आरेख अद्यतन होता है, तथा PDF / HTML निर्यात में भी आरेख शामिल रहते हैं।

## 1. फ़्लोचार्ट

```mermaid
flowchart TD
    A[शुरुआत] --> B{लॉगिन है?}
    B -- हाँ --> C[मुखपृष्ठ खोलें]
    B -- नहीं --> D[लॉगिन पर जाएँ]
    D --> E[प्रमाण-पत्र दर्ज करें]
    E --> C
    C --> F[समाप्त]
```

## 2. अनुक्रम आरेख

```mermaid
sequenceDiagram
    participant U as उपयोगकर्ता
    participant F as फ़्रंटएंड
    participant B as बैकएंड
    U->>F: लॉगिन पर क्लिक
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: मुखपृष्ठ पर पुनर्निर्देशित
```

## 3. वर्ग आरेख

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. अवस्था आरेख

```mermaid
stateDiagram-v2
    [*] --> लंबित_भुगतान
    लंबित_भुगतान --> भुगतान_हुआ: उपयोगकर्ता भुगतान करता है
    भुगतान_हुआ --> भेजा_गया: विक्रेता भेजता है
    भेजा_गया --> प्राप्त_हुआ: उपयोगकर्ता प्राप्त करता है
    प्राप्त_हुआ --> [*]
    लंबित_भुगतान --> रद्द: समय समाप्त
    रद्द --> [*]
```

## 5. गैंट चार्ट

```mermaid
gantt
    title परियोजना प्रगति
    dateFormat  YYYY-MM-DD
    section डिज़ाइन
    आवश्यकता विश्लेषण :a1, 2025-01-01, 7d
    प्रोटोटाइप डिज़ाइन :after a1, 5d
    section विकास
    फ़्रंटएंड विकास :2025-01-13, 10d
    बैकएंड विकास :2025-01-13, 12d
    section परीक्षण
    एकीकरण परीक्षण :2025-01-25, 5d
```

## 6. पाई चार्ट

```mermaid
pie title ब्राउज़र हिस्सेदारी
    "Chrome" : 65
    "Safari" : 18
    "Edge" : 8
    "Firefox" : 5
    "अन्य" : 4
```

## 7. इकाई-संबंध आरेख

> नोट: यदि erDiagram संबंध लेबल में गैर-ASCII अक्षर (जैसे हिंदी) हों, तो उन्हें दोहरे उद्धरण चिह्नों में बाँधना होगा (जैसे `: "ऑर्डर करता है"`); अन्यथा Mermaid लेक्सर उन्हें पार्स नहीं कर पाएगा।

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "ऑर्डर करता है"
    ORDER ||--|{ LINE_ITEM : "रखता है"
    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> यह अनुप्रयोग पूर्णतः ऑफ़लाइन है तथा इसमें अंतर्निहित Mermaid रेंडर इंजन है, अतः उपर्युक्त सभी आरेख बिना नेटवर्क के रेंडर होते हैं। अधिक सिंटैक्स हेतु आधिकारिक Mermaid दस्तावेज़ देखें (ऑनलाइन होने पर mermaid.js.org पर जाएँ)।
</script>
<script type="text/plain" id="mermaid-example-tpl-pa"># Mermaid ਚਾਰਟ ਉਦਾਹਰਣ

ਇਹ ਉਦਾਹਰਣ ਕਈ Mermaid ਚਾਰਟ ਦਰਸਾਉਂਦੀ ਹੈ। Markdown ਵਿੱਚ ਸਿਰਫ਼ <code>```mermaid</code> ਕੋਡ ਬਲਾਕ ਵਰਤੋ; ਝਲਕ ਇਸਨੂੰ ਆਪਣੇ-ਆਪ SVG ਰੈਂਡਰ ਕਰਦੀ ਹੈ। ਕੋਡ ਸੋਧਣ ਨਾਲ ਚਾਰਟ ਬਦਲਦਾ ਹੈ, ਅਤੇ PDF / HTML ਨਿਰਯਾਤ ਵਿੱਚ ਵੀ ਚਾਰਟ ਸ਼ਾਮਲ ਹੁੰਦੇ ਹਨ।

## 1. ਫ਼ਲੋਚਾਰਟ

```mermaid
flowchart TD
    A[ਸ਼ੁਰੂ] --> B{ਲਾਗ-ਇਨ ਹੈ?}
    B -- ਹਾਂ --> C[ਮੁੱਖ ਸਫ਼ਾ ਖੋਲ੍ਹੋ]
    B -- ਨਹੀਂ --> D[ਲਾਗ-ਇਨ ਉੱਤੇ ਜਾਓ]
    D --> E[ਪ੍ਰਮਾਣ-ਪੱਤਰ ਦਰਜ ਕਰੋ]
    E --> C
    C --> F[ਸਮਾਪਤ]
```

## 2. ਸੀਕੁਐਂਸ ਚਾਰਟ

```mermaid
sequenceDiagram
    participant U as ਵਰਤੋਂਕਾਰ
    participant F as ਫ਼ਰੰਟਐਂਡ
    participant B as ਬੈਕਐਂਡ
    U->>F: ਲਾਗ-ਇਨ ਉੱਤੇ ਕਲਿੱਕ
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: ਮੁੱਖ ਸਫ਼ੇ ਉੱਤੇ ਮੁੜ-ਨਿਰਦੇਸ਼ਿਤ
```

## 3. ਕਲਾਸ ਚਾਰਟ

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. ਅਵਸਥਾ ਚਾਰਟ

```mermaid
stateDiagram-v2
    [*] --> ਬਕਾਇਆ_ਭੁਗਤਾਨ
    ਬਕਾਇਆ_ਭੁਗਤਾਨ --> ਭੁਗਤਾਨ_ਹੋਇਆ: ਵਰਤੋਂਕਾਰ ਭੁਗਤਾਨ ਕਰਦਾ ਹੈ
    ਭੁਗਤਾਨ_ਹੋਇਆ --> ਭੇਜਿਆ_ਗਿਆ: ਵਿਕਰੇਤਾ ਭੇਜਦਾ ਹੈ
    ਭੇਜਿਆ_ਗਿਆ --> ਪ੍ਰਾਪਤ_ਹੋਇਆ: ਵਰਤੋਂਕਾਰ ਪ੍ਰਾਪਤ ਕਰਦਾ ਹੈ
    ਪ੍ਰਾਪਤ_ਹੋਇਆ --> [*]
    ਬਕਾਇਆ_ਭੁਗਤਾਨ --> ਰੱਦ: ਸਮਾਂ ਸਮਾਪਤ
    ਰੱਦ --> [*]
```

## 5. ਗੈਂਟ ਚਾਰਟ

```mermaid
gantt
    title ਪ੍ਰੋਜੈਕਟ ਤਰੱਕੀ
    dateFormat  YYYY-MM-DD
    section ਡਿਜ਼ਾਈਨ
    ਲੋੜ ਵਿਸ਼ਲੇਸ਼ਣ :a1, 2025-01-01, 7d
    ਪ੍ਰੋਟੋਟਾਈਪ ਡਿਜ਼ਾਈਨ :after a1, 5d
    section ਵਿਕਾਸ
    ਫ਼ਰੰਟਐਂਡ ਵਿਕਾਸ :2025-01-13, 10d
    ਬੈਕਐਂਡ ਵਿਕਾਸ :2025-01-13, 12d
    section ਟੈਸਟਿੰਗ
    ਏਕੀਕਰਣ ਟੈਸਟਿੰਗ :2025-01-25, 5d
```

## 6. ਪਾਈ ਚਾਰਟ

```mermaid
pie title ਬਰਾਊਜ਼ਰ ਹਿੱਸਾ
    "Chrome" : 65
    "Safari" : 18
    "Edge" : 8
    "Firefox" : 5
    "ਹੋਰ" : 4
```

## 7. ਇਕਾਈ-ਸੰਬੰਧ ਚਾਰਟ

> ਨੋਟ: ਜੇ erDiagram ਸੰਬੰਧ ਲੇਬਲ ਵਿੱਚ ਗ਼ੈਰ-ASCII ਅੱਖਰ (ਜਿਵੇਂ ਪੰਜਾਬੀ) ਹੋਣ, ਤਾਂ ਇਹਨਾਂ ਨੂੰ ਦੋਹਰੇ ਹਵਾਲੇ ਨਿਸ਼ਾਨ ਵਿੱਚ ਬੰਨ੍ਹਣਾ ਹੋਵੇ (ਜਿਵੇਂ `: "ਆਰਡਰ ਦਿੰਦਾ ਹੈ"`); ਨਹੀਂ ਤਾਂ Mermaid lexer ਪਾਰਸ ਨਹੀਂ ਕਰ ਸਕੇਗਾ।

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "ਆਰਡਰ ਦਿੰਦਾ ਹੈ"
    ORDER ||--|{ LINE_ITEM : "ਰੱਖਦਾ ਹੈ"
    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> ਇਹ ਐਪ੍ਲੀਕੇਸ਼ਨ ਪੂਰੀ ਤਰ੍ਹਾਂ ਆਫ਼ਲਾਈਨ ਹੈ ਅਤੇ ਇਸ ਵਿੱਚ ਬਿਲਟ-ਇਨ Mermaid ਰੈਂਡਰ ਇੰਜਣ ਹੈ, ਇਸ ਲਈ ਉੱਪਰ ਦਿੱਤੇ ਸਾਰੇ ਚਾਰਟ ਬਿਨਾਂ ਨੈੱਟਵਰਕ ਰੈਂਡਰ ਹੁੰਦੇ ਹਨ। ਹੋਰ ਸਿੰਟੈਕਸ ਲਈ ਅਧਿਕਾਰਤ Mermaid ਦਸਤਾਵੇਜ਼ ਵੇਖੋ (ਆਨਲਾਈਨ ਹੋਣ ’ਤੇ mermaid.js.org ਜਾਓ)।
</script>
<script type="text/plain" id="mermaid-example-tpl-vi"># Ví dụ sơ đồ Mermaid

Ví dụ này minh họa nhiều loại sơ đồ Mermaid. Trong Markdown, chỉ cần dùng khối mã <code>```mermaid</code>; phần xem trước tự động kết xuất thành SVG. Sửa mã là sửa sơ đồ, và sơ đồ cũng được đưa vào khi xuất PDF / HTML.

## 1. Lưu đồ

```mermaid
flowchart TD
    A[Bắt đầu] --> B{Đã đăng nhập?}
    B -- Có --> C[Vào trang chính]
    B -- Không --> D[Đi tới đăng nhập]
    D --> E[Nhập thông tin]
    E --> C
    C --> F[Kết thúc]
```

## 2. Sơ đồ tuần tự

```mermaid
sequenceDiagram
    participant U as Người dùng
    participant F as Giao diện
    participant B as Backend
    U->>F: Bấm đăng nhập
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: Chuyển về trang chính
```

## 3. Sơ đồ lớp

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. Sơ đồ trạng thái

```mermaid
stateDiagram-v2
    [*] --> Chờ_Thanh_Toán
    Chờ_Thanh_Toán --> Đã_Thanh_Toán: Người dùng thanh toán
    Đã_Thanh_Toán --> Đã_Gửi: Người bán gửi hàng
    Đã_Gửi --> Đã_Nhận: Người dùng nhận hàng
    Đã_Nhận --> [*]
    Chờ_Thanh_Toán --> Đã_Hủy: Hết thời gian
    Đã_Hủy --> [*]
```

## 5. Biểu đồ Gantt

```mermaid
gantt
    title Tiến độ dự án
    dateFormat  YYYY-MM-DD
    section Thiết kế
    Phân tích yêu cầu :a1, 2025-01-01, 7d
    Thiết kế nguyên mẫu :after a1, 5d
    section Phát triển
    Phát triển giao diện :2025-01-13, 10d
    Phát triển backend :2025-01-13, 12d
    section Kiểm thử
    Kiểm thử tích hợp :2025-01-25, 5d
```

## 6. Biểu đồ tròn

```mermaid
pie title Thị phần trình duyệt
    "Chrome" : 65
    "Safari" : 18
    "Edge" : 8
    "Firefox" : 5
    "Khác" : 4
```

## 7. Sơ đồ thực thể-kết hợp

> Lưu ý: Nếu nhãn quan hệ trong erDiagram chứa ký tự non-ASCII (như tiếng Việt), phải bọc trong dấu ngoặc kép (vd. `: "đặt hàng"`); nếu không bộ phân tích từ vựng Mermaid sẽ không thể đọc.

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "đặt hàng"
    ORDER ||--|{ LINE_ITEM : "chứa"
    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> Ứng dụng này hoàn toàn ngoại tuyến với engine kết xuất Mermaid tích hợp sẵn, nên mọi sơ đồ trên đều kết xuất không cần mạng. Thêm cú pháp, xem tài liệu Mermaid chính thức (khi trực tuyến, ghé mermaid.js.org).
</script>
<script type="text/plain" id="mermaid-example-tpl-id"># Contoh Diagram Mermaid

Contoh ini memperagakan aneka diagram Mermaid. Dalam Markdown, cukup pakai blok kode <code>```mermaid</code>; pratinjau merendernya menjadi SVG. Mengubah kode berarti mengubah diagram, dan ekspor PDF / HTML juga menyertakannya.

## 1. Diagram Alir

```mermaid
flowchart TD
    A[Mulai] --> B{Sudah login?}
    B -- Ya --> C[Masuk beranda]
    B -- Tidak --> D[Ke login]
    D --> E[Masukkan kredensial]
    E --> C
    C --> F[Selesai]
```

## 2. Diagram Urutan

```mermaid
sequenceDiagram
    participant U as Pengguna
    participant F as Frontend
    participant B as Backend
    U->>F: Klik login
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: Arahkan ke beranda
```

## 3. Diagram Kelas

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. Diagram Status

```mermaid
stateDiagram-v2
    [*] --> Menunggu_Pembayaran
    Menunggu_Pembayaran --> Dibayar: Pengguna membayar
    Dibayar --> Dikirim: Penjual mengirim
    Dikirim --> Diterima: Pengguna menerima
    Diterima --> [*]
    Menunggu_Pembayaran --> Dibatalkan: Waktu habis
    Dibatalkan --> [*]
```

## 5. Diagram Gantt

```mermaid
gantt
    title Kemajuan Proyek
    dateFormat  YYYY-MM-DD
    section Desain
    Analisis kebutuhan :a1, 2025-01-01, 7d
    Desain prototipe :after a1, 5d
    section Pengembangan
    Pengembangan frontend :2025-01-13, 10d
    Pengembangan backend :2025-01-13, 12d
    section Pengujian
    Pengujian integrasi :2025-01-25, 5d
```

## 6. Diagram Pai

```mermaid
pie title Pangsa Peramban
    "Chrome" : 65
    "Safari" : 18
    "Edge" : 8
    "Firefox" : 5
    "Lainnya" : 4
```

## 7. Diagram Entitas-Hubungan

> Catatan: Bila label relasi erDiagram memuat karakter non-ASCII (mis. Indonesia), harus dibungkus tanda kutip ganda (mis. `: "membuat pesanan"`); jika tidak, lexer Mermaid tak bisa mengurainya.

```mermaid
erDiagram
    CUSTOMER ||--o{ ORDER : "membuat pesanan"
    ORDER ||--|{ LINE_ITEM : "memuat"
    CUSTOMER {
        int id PK
        string name
    }
    ORDER {
        int id PK
        date created
    }
    LINE_ITEM {
        int id PK
        string product
        int qty
    }
```

> Aplikasi ini sepenuhnya luring dengan mesin render Mermaid bawaan, sehingga semua diagram di atas terender tanpa jaringan. Untuk sintaks lebih lanjut, lihat dokumentasi Mermaid resmi (saat daring, kunjungi mermaid.js.org).
</script>
<script type="text/plain" id="mermaid-example-tpl-ur"># Mermaid خاکے کی مثال

یہ مثال مختلف Mermaid خاکے دکھاتی ہے۔ Markdown میں صرف <code>```mermaid</code> کوڈ بلاک استعمال کریں؛ پیش نظارہ اسے خود SVG رینڈر کرتا ہے۔ کوڈ بدلنے سے خاکہ بدلتا ہے، اور PDF / HTML برآمد میں بھی خاکے شامل رہتے ہیں۔

## 1. فلو چارٹ

```mermaid
flowchart TD
    A[آغاز] --> B{لاگ اِن ہے؟}
    B -- ہاں --> C[صفحہِ اول داخل]
    B -- نہیں --> D[لاگ اِن پر جائیں]
    D --> E[اسناد درج کریں]
    E --> C
    C --> F[اختتام]
```

## 2. تسلسل خاکہ

```mermaid
sequenceDiagram
    participant U as صارف
    participant F as فرنٹ اینڈ
    participant B as بیک اینڈ
    U->>F: لاگ اِن کلک
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: صفحہِ اول پر ریڈائریکٹ
```

## 3. کلاس خاکہ

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. حالت خاکہ

```mermaid
stateDiagram-v2
    [*] --> بقی_ادائیگی
    بقی_ادائیگی --> ادا_ہوا: صارف ادا کرتا ہے
    ادا_ہوا --> بھیجا_گیا: فروشک بھیجتا ہے
    بھیجا_گیا --> موصول_ہوا: صارف وصول کرتا ہے
    موصول_ہوا --> [*]
    بقی_ادائیگی --> منسوخ: وقت ختم
    منسوخ --> [*]
```

## 5. گینٹ چارٹ

```mermaid
gantt
    title پروجیکٹ پیش رفت
    dateFormat  YYYY-MM-DD
    section ڈیزائن
    تقاضوں کا تجزیہ :a1, 2025-01-01, 7d
    پروٹو ٹائپ ڈیزائن :after a1, 5d
    section ترقی
    فرنٹ اینڈ ترقی :2025-01-13, 10d
    بیک اینڈ ترقی :2025-01-13, 12d
    section جانچ
    انضمام جانچ :2025-01-25, 5d
```

## 6. پائی چارٹ

```mermaid

<script type="text/plain" id="mermaid-example-tpl-mn"># Mermaid диаграммын жишээ

Энэ жишээ нь төрөл бүрийн Mermaid диаграммыг харуулна. Markdown-д <code>```mermaid</code> код блок ашиглаад л болно; урьдчилан харах автоматаар SVG болгон хөрвүүлнэ. Кодыг засварлах нь диаграммыг шинэчилнэ, PDF / HTML экспорт ч мөн диаграммыг агуулна.

## 1. Урсгалын диаграмм

```mermaid
flowchart TD
    A[Эхлэл] --> B{Нэвтэрсэн үү?}
    B -- Тийм --> C[Нүүр хуудас руу орох]
    B -- Үгүй --> D[Нэвтрэх рүү очих]
    D --> E[Итгэмжлэх оруулах]
    E --> C
    C --> F[Төгсгөл]
```

## 2. Дарааллын диаграмм

```mermaid
sequenceDiagram
    participant U as Хэрэглэгч
    participant F as Фронтенд
    participant B as Бэкенд
    U->>F: Нэвтрэх дарах
    F->>B: POST /login
    B-->>F: 200 OK + Token
    F-->>U: Нүүр хуудас руу шилжүүлэх
```

## 3. Ангийн диаграмм

```mermaid
classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +fetch() void
    }
    class Cat {
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat
```

## 4. Төлөвийн диаграмм

```mermaid
stateDiagram-v2
    [*] --> Хүлээв_төлбөр
    Хүлээв_төлбөр --> Төлөгдсөн: Хэрэглэгч төлнө
    Төлөгдсөн --> Илгээгдсэн: Борлуулагч илгээнэ
    Илгээгдсөн --> Хүлээн_авсан: Хэрэглэгч хүлээн авна
    Хүлээн_авсан --> [*]
    Хүлээв_төлбөр --> Цуцлагдсан: Хугацаа дуусна
    Цуцлагдсан --> [*]
```

## 5. Ганттын график

```mermaid
gantt
    title Төслийн явц
    dateFormat  YYYY-MM-DD
    section Зохиомж
    Шаардлагын шинжилгээ :a1, 2025-01-01, 7d
    Прототип зохиомж :after a1, 5d
    section Хөгжүүлэлт
    Фронтенд хөгжүүлэлт :2025-01-13, 10d
    Бэкенд хөгжүүлэлт :2025-01-13, 12d
    section Туршилт
    Нэгтгэх туршилт :2025-01-25, 5d
```

## 6. Бөөрөнхий график

```mermaid
pie title Хөтөчийн захиалга
    "Chrome" : 65
    "Safari" : 18
    "Edge" : 8
    "Firefox" : 5
    "Бусад" : 4
```

## 7. Субъект-харилцааны диаграмм

> Тэмдэглэл: erDiagram-ын харилцааны шошго ASCII бус тэмдэгт (жишээ нь кирил) агуулбал хос хосоор хашилтанд авна (жишээ нь `: "захиалга өгнө"`); үгүй бол Mermaid лексер задалж чадахгүй.

```mermaid
erDiagram

    ORDER ||--|{ LINE_ITEM : "агуулна"
    CUSTOMER {
        int id PK
        string name

        int id PK
        date created
    }

## Боломжууд

- ✅ Хуваасан самбарт шууд урьдчилан харах (чирж хэмжээ өөрчлөх)
- ✅ Математикийн томьёо: шугаман $E = mc^2$, $e^{i\\pi}+1=0$
- ✅ Зураг: буулгах / чирэх / сонгох — `<filename>_images/` хавтсанд хадгална (цэвэр эх код, base64 гэж байхгүй)
- ✅ Кодоор өнгөлөх (хэл автоматаар таних)
- ✅ Хүснэгт, даалгаврын жагсаалт, ишлэлийн блок, дундуур зураас
- ✅ Бараан / цайвар загвар, Markdown / PDF / LaTeX болгох, автомат ноорог

## Томьёо

Эйлерийн тэгшитгэл $e^{i\\pi} + 1 = 0$.

$$
\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}
$$

    src = src.replace(/​CODE(\d+)​/g, (_m, i) => codeStore[+i] || "");

    let html;
    try { html = marked.parse(src); }
    catch (e) { html = '<p style="color:red">渲染错误: ' + escapeHtml(String(e)) + '</p>'; }

    if (window.DOMPurify) {
      html = DOMPurify.sanitize(html, {
        ADD_ATTR: ["target", "colspan", "rowspan", "align", "loading", "aria-hidden", "encoding"],
      });
    }

    // 把占位符替换成 KaTeX 渲染结果（在 DOMPurify 之后，KaTeX 输出不再被过滤）
    // 单次正则替换，避免 O(html 长 × 公式数) 的 split/join 循环（公式多的大文档会明显卡顿）
    // display 公式外层包 .mdmath 并存原始 tex，供 wrapDisplayMath 超长时按运算符折行重渲。
    if (window.katex && store.length) {
      const rendered = store.map((s) => {
        let out;
        try {
          out = katex.renderToString(s.tex, { displayMode: s.display, throwOnError: false });
        } catch (e) {
          out = '<span style="color:#d33" title="' + escapeHtml(String(e)) + '">' +
            escapeHtml(s.tex) + "</span>";
        }
        if (s.display) {
          // data-tex 存原始 LaTeX（encodeURIComponent 防属性注入），便于折行重渲
          out = '<span class="mdmath" data-tex="' + encodeURIComponent(s.tex) + '">' + out + "</span>";
        }
        return out;
      });
      html = html.replace(/​MATH(\d+)​/g, (_m, i) => rendered[+i] || "");
    }

    // 还原引用占位为 [n] 上标，并追加「参考文献」表（单次正则，见 BUG-011）
    html = renderCitations(html, citeList, bibDB);

    // mermaid 预渲染（异步）：把 ```mermaid 代码块替换为 SVG，写入 html 字符串。
    // 代际守卫：await 后若已有更新的 render 启动，丢弃本次结果，避免覆盖新内容。
    const myGen = ++renderGen;
    html = await renderMermaidInHtml(html);
    if (myGen !== renderGen) return;
    renderIntoPreview(html);
  }
  // HTML 模式：用 KaTeX auto-render 渲染 $...$ / $$...$$（HTML 里公式是字面量，不像 MD 模式已预渲染）
  function renderMathAuto(root) {
    if (window.renderMathInElement) {
      try {
        renderMathInElement(root, {
          delimiters: [{ left: "$$", right: "$$", display: true }, { left: "$", right: "$", display: false }],
          throwOnError: false,
        });
      } catch (e) {}
    }
  }
  // 把已构建好的完整 HTML 挂进预览：大文档虚拟化、小文档全量；含代码高亮/公式折行/图片解析。
  // Markdown 与 HTML 两种模式最终都走这里。
  // 细粒度点击定位：返回"列表项 / 表格行"在源码区间 [s,e) 内的起始偏移数组（含 s）。空=该块无细粒度（退回块级）。
  // 确定性扫描源码（不依赖 marked 内部），与 srcBlockOffsets 同思路；bibtex 等长空白替换不影响列表/表格扫描。
  function fineUnitOffsets(s, e) {
    const block = editor.value.slice(s, e);
    const lines = []; let rel = 0;
    for (const ln of block.split("\n")) { lines.push([rel, ln]); rel += ln.length + 1; }
    const isItem = (t) => /^[ \t]*([-*+]|\d+\.)[ \t]/.test(t);
    const isSep = (t) => /^[ \t|:-]+$/.test(t) && /-/.test(t);
    if (lines.some(([, t]) => isItem(t)))
      return lines.filter(([, t]) => isItem(t)).map(([r]) => s + r);            // 列表项（含嵌套，深度优先≈源码序）
    if (lines.some(([, t]) => isSep(t)))
      return lines.filter(([, t]) => /\|/.test(t) && !isSep(t)).map(([r]) => s + r); // 表格行（跳过分隔行）
    return [];
  }
  // 给列表/表格块的 <li>/<tr> 打 data-src-offset/end；点击时 closest("[data-src-offset]") 自动落到更细的项/行。
  function tagFineInBlock(el, s, e) {
    if (!el || e <= s) return;
    const tag = el.tagName;
    if (tag !== "UL" && tag !== "OL" && tag !== "TABLE") return;
    const offs = fineUnitOffsets(s, e); if (!offs.length) return;
    const units = el.querySelectorAll(tag === "TABLE" ? "tr" : "li");
    for (let i = 0; i < units.length && i < offs.length; i++) {
      const st = offs[i], en = (i + 1 < offs.length ? offs[i + 1] : e);
      units[i].setAttribute("data-src-offset", st);
      units[i].setAttribute("data-src-end", en);
    }
  }
  function renderIntoPreview(html) {
    // 表格统一包一层 .table-wrap：窄表居中、宽表横向滚动（CSS 见 #preview .table-wrap）。
    // marked 不输出嵌套 <table>，非贪婪匹配即安全；bibliography 用 <ol>，不会误伤。
    if (html.indexOf("<table") !== -1)
      html = html.replace(/<table(\s[^>]*)?>[\s\S]*?<\/table>/g,
        (m) => '<div class="table-wrap">' + m + "</div>");
    lastFullHtml = html; // 供 PDF 导出取用完整 HTML，不依赖预览 DOM（虚拟化时预览只挂可见块）
    // 大文档虚拟化：只挂可见块；小文档全量渲染。用一次 template 解析同时完成块计数与切分。
    const tpl = document.createElement("template");
    tpl.innerHTML = html;
    // 给每个顶层块打上 data-src-offset（源码偏移量），供点击定位用
    const children = Array.from(tpl.content.children);
    for (let i = 0; i < children.length && i < srcBlockOffsets.length; i++) {
      const so = srcBlockOffsets[i];
      const eo = i + 1 < srcBlockOffsets.length ? srcBlockOffsets[i + 1] : editor.value.length;
      children[i].setAttribute("data-src-offset", so);
      children[i].setAttribute("data-src-end", eo);
      tagFineInBlock(children[i], so, eo); // 列表/表格：给 li/tr 打细粒度偏移
    }
    const blockCount = children.length;
    if (blockCount > VIRT_THRESHOLD) {
      const keepScroll = preview.scrollTop;
      vClear();
      vSetup(tpl);          // 复用已解析的 template，不再二次解析
      preview.scrollTop = Math.min(keepScroll, vprefix[vblocks.length] - (preview.clientHeight || 0));
      renderVisible();
    } else {
      vClear();
      preview.innerHTML = html;
      // 非虚拟化：直接在 DOM 上标记 data-src-offset（template 上的标记不会随 innerHTML 带过来）
      const pvChildren = preview.children;
      for (let i = 0; i < pvChildren.length && i < srcBlockOffsets.length; i++) {
        const so = srcBlockOffsets[i];
        const eo = i + 1 < srcBlockOffsets.length ? srcBlockOffsets[i + 1] : editor.value.length;
        pvChildren[i].setAttribute("data-src-offset", so);
        pvChildren[i].setAttribute("data-src-end", eo);
        tagFineInBlock(pvChildren[i], so, eo);
      }
      // 代码高亮：懒加载——只高亮进入视口的代码块（IntersectionObserver）。
      highlightCodeLazy();
      wrapDisplayMath(preview);
      // HTML 模式：渲染 $...$ 数学公式（MD 模式已在 html 字符串里预渲染，不需要）
      const at = activeTab();
      if (at && at.type === "html") renderMathAuto(preview);
      if (isTauri && at) resolveImages(preview, at.dir || "");
    }
    updateStats();
    $("rs").textContent = t("rendered");
    buildPreviewBlockY(); // 测预览块顶 Y（非虚拟化每次渲染测一次缓存；虚拟化用 vprefix，此处空操作）
    if (searchBar && !searchBar.hidden) highlightPreview();
    syncViewerWindows();   // mermaid 查看器 live update：推送对应块的新 SVG
  }

  /* ---------- 预览虚拟化（大文档）---------- */
  // 仅把可见区域（含缓冲）的块挂进 DOM，上下用 spacer 撑出总高度，滚动时按需切换可见块。
  // 这样预览 DOM 节点数与文档大小无关，只随可见区域变化——大文档也能丝滑滚动与即时编辑。
  // 小文档（块数 ≤ 阈值）走原 innerHTML 全量渲染，避免滚动条估算误差。
  const VIRT_THRESHOLD = 300;
  let lastFullHtml = "";       // 最近一次完整渲染的 HTML（供 PDF 导出使用，不依赖预览 DOM）
  let vblocks = [];            // 块 DOM 节点数组（来自 template 解析，未挂载到预览）
  let vheights = [];           // 每块高度：实测缓存，否则估算
  let vprefix = [0];           // 前缀和，vprefix[i] = 前 i 块高度之和
  let vRangeStart = -1, vRangeEnd = -1;
  let vScrollRaf = 0;
  let vSpacerTop = null, vContent = null, vSpacerBottom = null;

  // 按节点结构粗略估算块高度（px）。实测后会缓存真实值覆盖。避免对每块做 outerHTML 序列化。
  function estimateFromNode(el) {
    const tag = el.tagName;
    if (tag === "H1") return 52;
    if (tag === "H2") return 42;
    if (tag === "H3") return 34;
    if (tag === "H4" || tag === "H5" || tag === "H6") return 30;
    if (tag === "HR") return 24;
    if (tag === "PRE") return 40 + Math.max(1, (el.textContent.match(/\n/g) || []).length) * 18;
    if (tag === "UL" || tag === "OL") return 20 + Math.max(1, el.querySelectorAll("li").length) * 28;
    if (tag === "TABLE") return 20 + Math.max(1, el.querySelectorAll("tr").length) * 30;
    if (tag === "BLOCKQUOTE") return 36 + Math.max(1, el.querySelectorAll("p").length) * 28;
    const lines = el.querySelectorAll("p,br").length;
    const tlen = (el.textContent || "").length;
    return 28 + Math.max(1, lines) * 26 + (tlen > 200 ? Math.floor((tlen - 200) / 40) * 24 : 0);
  }
  function vRecomputePrefix() {
    vprefix = [0];
    for (let i = 0; i < vblocks.length; i++) vprefix.push(vprefix[i] + vheights[i]);
  }
  // 用已解析的 template 初始化虚拟化结构（复用 render() 的解析结果，不再二次解析）
  function vSetup(tpl) {
    vblocks = Array.from(tpl.content.children);
    vheights = vblocks.map(estimateFromNode);
    vRecomputePrefix();
    vRangeStart = vRangeEnd = -1;
    // 建立 spacer / content 三段结构
    vSpacerTop = document.createElement("div");
    vContent = document.createElement("div");
    vContent.className = "vcontent";
    vSpacerBottom = document.createElement("div");
    preview.appendChild(vSpacerTop);
    preview.appendChild(vContent);
    preview.appendChild(vSpacerBottom);
  }
  function vClear() {
    if (hljsObserver) { hljsObserver.disconnect(); }
    preview.innerHTML = ""; // 清空所有内容（全量 html 或 spacer 结构），避免模式切换时残留
    vSpacerTop = vContent = vSpacerBottom = null;
    vblocks = []; vheights = []; vprefix = [0]; vRangeStart = vRangeEnd = -1;
  }
  function renderVisible() {
    if (!vblocks.length || !vContent) return;
    const st = preview.scrollTop;
    const ch = preview.clientHeight || 600;
    const buf = 320;
    let s = 0;
    while (s < vblocks.length && vprefix[s + 1] <= st - buf) s++;
    let e = s;
    while (e < vblocks.length && vprefix[e] < st + ch + buf) e++;
    if (e <= s) e = Math.min(vblocks.length, s + 1);
    if (s === vRangeStart && e === vRangeEnd) return;
    vRangeStart = s; vRangeEnd = e;
    vSpacerTop.style.height = vprefix[s] + "px";
    vContent.innerHTML = "";
    const frag = document.createDocumentFragment();
    for (let i = s; i < e; i++) frag.appendChild(vblocks[i].cloneNode(true));
    vContent.appendChild(frag);
    vSpacerBottom.style.height = (vprefix[vblocks.length] - vprefix[e]) + "px";
    // 先缩放超长公式（会改变其高度），再实测块高度，避免高度缓存失真
    wrapDisplayMath(vContent);
    // 实测可见块高度并回填缓存，修正滚动条
    let changed = false;
    const kids = vContent.children;
    for (let k = 0; k < kids.length; k++) {
      const idx = s + k;
      const h = kids[k].offsetHeight;
      if (h && Math.abs(h - vheights[idx]) > 1) { vheights[idx] = h; changed = true; }
    }
    if (changed) {
      vRecomputePrefix();
      vSpacerTop.style.height = vprefix[s] + "px";
      vSpacerBottom.style.height = (vprefix[vblocks.length] - vprefix[e]) + "px";
    }
    // 高亮可见代码块（已可见，无需懒加载）
    if (window.hljs) {
      vContent.querySelectorAll("pre code:not([data-hl])").forEach((el) => {
        el.setAttribute("data-hl", "1");
        try { hljs.highlightElement(el); } catch (_) {}
      });
    }
    const at = activeTab();
    // HTML 模式：渲染可见区的 $...$ 数学公式
    if (at && at.type === "html") renderMathAuto(vContent);
    if (isTauri && at) resolveImages(vContent, at.dir || "");
    $("rs").textContent = t("rendered");
    buildPreviewBlockY(); // 测预览块顶 Y（非虚拟化每次渲染测一次缓存；虚拟化用 vprefix，此处空操作）
    if (searchBar && !searchBar.hidden) highlightPreview();
    syncViewerWindows();   // mermaid 查看器 live update：推送对应块的新 SVG
  }
  function scheduleRenderVisible() {
    if (vScrollRaf) return;
    vScrollRaf = requestAnimationFrame(() => { vScrollRaf = 0; renderVisible(); });
  }

  // 把容器内指向本地文件的 <img>（相对路径）按 .md 所在目录解析为 base64 data URL。
  function resolveImages(root, dir) {
    root.querySelectorAll("img").forEach((img) => {
      let src = img.getAttribute("src") || "";
      if (!src || /^(data:|https?:|blob:|asset:)/i.test(src)) return; // 已是可用源
      // marked 会把图片 URL 中的非 ASCII（如中文文件夹名 未命名_images）percent-encode 成 %E6%9C%AA…
      // 直接当 fs 路径读会与真实 UTF-8 文件名不匹配 → 读不到。先 decodeURIComponent 还原 UTF-8 再拼路径。
      try { src = decodeURIComponent(src); } catch (_) {}
      // 绝对路径（Unix / 开头 或 Windows 盘符 X:）直接用；相对路径按文档目录拼。
      // 草稿标签（未保存、dir 为空）拖入的图片是绝对路径，仍可读取渲染；
      // 此时相对路径无法解析则跳过，避免拼成 "/pic.png" 误读根路径（见 BUG-033）。
      const isAbs = src.charAt(0) === "/" || /^[A-Za-z]:[\\/]/.test(src);
      if (!isAbs && !dir) return;
      const abs = isAbs ? src : dir + "/" + src;
      // imgCache[abs] 缓存 Promise<dataURL|null>：首次 invoke 创建，后续 render 的 img 共享同一 Promise。
      // 用 Promise 而非 null 标记：双击打开等场景连触多次 render(loadTab 的 rAF + init 的 rAF/setTimeout),
      // innerHTML 替换使旧 img 脱离 DOM；旧 invoke 回调只设旧 img(无效)，新 img 因 null 标记被跳过 → 首次不显示(BUG-076)。
      // 改 Promise 后，每个 img 各自 .then 拿同一结果设自身 src(isConnected 守卫防脱离 DOM 的旧 img)。
      if (!(abs in imgCache)) {
        imgCache[abs] = invoke("read_image_data_url", { path: abs })
          .then((url) => {
            if (typeof url === "string" && url.indexOf("data:") === 0) return url;
            delete imgCache[abs]; return null; // 失败/非图片：清缓存允许下次重试
          })
          .catch(() => { delete imgCache[abs]; return null; });
      }
      Promise.resolve(imgCache[abs]).then((url) => { if (url && img.isConnected) img.src = url; });
    });
  }

  function scheduleRender() {
    markDirty();
    $("rs").textContent = t("rendering");
    clearTimeout(renderTimer);
    // 大文档全量解析较重，用更长防抖避免连击卡顿；小文档保持 120ms 灵敏。
    const delay = editor.value.length > 60000 ? 450 : 120;
    renderTimer = setTimeout(render, delay);
    saveDraft();
  }

  /* ---------- 统计 ---------- */
  function updateStats() {
    const v = editor.value;
    const chars = v.length;
    const cn = (v.match(/[一-龥]/g) || []).length;
    const en = (v.replace(/[一-龥]/g, " ").match(/[A-Za-z0-9_]+/g) || []).length;
    const lines = v.split("\n").length;
    $("s-chars").textContent = chars + " " + t("chars");
    $("s-words").textContent = (cn + en) + " " + t("words");
    $("s-lines").textContent = t("lines") + " " + lines;
    $("wc").textContent = (cn + en) + " " + t("wUnit");
  }
  function updateCursor() {
    const p = editor.selectionStart;
    const before = editor.value.slice(0, p);
    $("s-cursor").textContent = t("lnCol").replace("{l}", before.split("\n").length).replace("{c}", p - before.lastIndexOf("\n"));
  }

  /* ---------- 编辑辅助 ---------- */
  function wrapSelection(before, after, ph) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    const sel = editor.value.slice(s, e) || ph;
    editor.value = editor.value.slice(0, s) + before + sel + (after || "") + editor.value.slice(e);
    const cs = s + before.length;
    editor.setSelectionRange(cs, cs + sel.length);
    editor.focus(); scheduleRender();
  }
  function linePrefix(prefix) {
    const s = editor.selectionStart, v = editor.value;
    const ls = v.lastIndexOf("\n", s - 1) + 1;
    editor.value = v.slice(0, ls) + prefix + v.slice(ls);
    editor.setSelectionRange(s + prefix.length, s + prefix.length);
    editor.focus(); scheduleRender();
  }
  function insertBlock(text, f, t) {
    const s = editor.selectionStart, v = editor.value;
    const nl = s > 0 && v[s - 1] !== "\n" ? "\n" : "";
    editor.value = v.slice(0, s) + nl + text + v.slice(s);
    const base = s + nl.length;
    editor.setSelectionRange(base + (f || 0), base + (t || 0));
    editor.focus(); scheduleRender();
  }

  const MD = {
    bold:   () => wrapSelection("**", "**", "加粗文本"),
    italic: () => wrapSelection("*", "*", "斜体文本"),
    strike: () => wrapSelection("~~", "~~", "删除线"),
    code:   () => wrapSelection("`", "`", "code"),
    h1:     () => linePrefix("# "),
    h2:     () => linePrefix("## "),
    h3:     () => linePrefix("### "),
    quote:  () => linePrefix("> "),
    ul:     () => linePrefix("- "),
    ol:     () => linePrefix("1. "),
    task:   () => linePrefix("- [ ] "),
    link:   () => wrapSelection("[", "](https://)", "链接文字"),
    image:  () => pickImage(),
    table:  () => insertBlock("\n| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n| A | B | C |\n| D | E | F |\n", 0, 0),
    formula:() => insertBlock("\n$$\nE = mc^2\n$$\n", 5, 5),
    hr:     () => insertBlock("\n---\n", 0, 0),
  };
  document.querySelectorAll("[data-md]").forEach((b) =>
    b.addEventListener("click", () => MD[b.dataset.md] && MD[b.dataset.md]()));

  /* ---------- 前进/返回：统一导航历史（文档/标签跳转 + 文件内光标位置）----------
     navStack 记录"导航点" {tabId, offset, scrollTop}：标签切换/链接打开/点击定位时即时记；
     文件内光标远距(>200 字)移动后防抖记一条（覆盖"编辑历史"）。返回/前进在栈内回溯，
     程序化跳转(navGo)期间 navSuppress 抑制再记录，避免自激；关闭标签后 navPrune 清理。 */
  let navStack = [];
  let navIdx = -1;
  let navSuppress = false;
  let navEditTimer = null;
  function updateNavBtns() {
    const b = $("nav-back"), f = $("nav-fwd");
    if (b) b.disabled = navIdx <= 0;
    if (f) f.disabled = navIdx >= navStack.length - 1;
  }
  function navPush() {
    if (navSuppress) return;
    const at = activeTab(); if (!at) return;
    const pos = { tabId: at.id, offset: editor.selectionStart, scrollTop: editor.scrollTop };
    const cur = navStack[navIdx];
    // 去重：同标签且偏移/滚动几乎不变则不记
    if (cur && cur.tabId === pos.tabId && Math.abs(cur.offset - pos.offset) <= 2 && Math.abs(cur.scrollTop - pos.scrollTop) <= 4) return;
    navStack.length = navIdx + 1;                 // 截断前进历史
    navStack.push(pos);
    navIdx = navStack.length - 1;
    updateNavBtns();
  }
  function navPrune() {
    const n = navStack.filter((p) => tabs.some((x) => x.id === p.tabId));
    if (n.length === navStack.length) return;
    navStack = n;
    if (!navStack.length) navIdx = -1;
    else if (navIdx >= navStack.length) navIdx = navStack.length - 1;
    updateNavBtns();
  }
  async function navGo(idx) {
    if (idx < 0 || idx >= navStack.length) return;
    const pos = navStack[idx];
    if (!tabs.some((x) => x.id === pos.tabId)) { navPrune(); return; }
    navSuppress = true;
    try {
      if (pos.tabId !== activeId) switchTab(pos.tabId);
      editor.setSelectionRange(pos.offset, pos.offset);
      editor.scrollTop = pos.scrollTop;
      editor.focus();
    } finally { navIdx = idx; navSuppress = false; updateNavBtns(); }
  }
  function navBack() { if (navIdx > 0) navGo(navIdx - 1); }
  function navFwd() { if (navIdx < navStack.length - 1) navGo(navIdx + 1); }
  function navOnEdit() {
    if (navSuppress) return;
    clearTimeout(navEditTimer);
    navEditTimer = setTimeout(() => {
      const at = activeTab(); if (!at) return;
      const cur = navStack[navIdx];
      const off = editor.selectionStart;
      const v = editor.value;
      const newLine = v.slice(0, off).split("\n").length;
      // 记录每步编辑操作的位置：不同标签，或换了行（同行连续输入合并为一条，避免逐字符淹没）
      const sameLine = cur && cur.tabId === at.id && v.slice(0, cur.offset).split("\n").length === newLine;
      if (!sameLine) navPush();
    }, 350);
  }
  // 自定义撤销/重做栈（textarea execCommand 在 WKWebView 不可靠——一次全退回，改自建快照栈）
  let undoStack = [], redoStack = [];
  let undoLast = { v: "", s: 0, e: 0 };
  let undoTimer = 0;
  function undoSnapshot() {
    clearTimeout(undoTimer);
    undoTimer = setTimeout(() => {
      if (editor.value !== undoLast.v) {
        undoStack.push(undoLast);
        if (undoStack.length > 500) undoStack.shift();
        redoStack = [];
      }
      undoLast = { v: editor.value, s: editor.selectionStart, e: editor.selectionEnd };
    }, 200); // 200ms 合并：连续快速输入=一步，停顿>200ms=新的一步（细粒度）
  }
  function doUndo() {
    if (!undoStack.length) return;
    redoStack.push({ v: editor.value, s: editor.selectionStart, e: editor.selectionEnd });
    const p = undoStack.pop();
    editor.value = p.v; editor.setSelectionRange(p.s, p.e || p.s); undoLast = p;
    editor.focus(); scheduleRender();
  }
  function doRedo() {
    if (!redoStack.length) return;
    undoStack.push({ v: editor.value, s: editor.selectionStart, e: editor.selectionEnd });
    const n = redoStack.pop();
    editor.value = n.v; editor.setSelectionRange(n.s, n.e || n.s); undoLast = n;
    editor.focus(); scheduleRender();
  }
  function resetUndo() { undoStack = []; redoStack = []; undoLast = { v: editor.value, s: editor.selectionStart, e: editor.selectionEnd }; }
  (function initNav() {
    const u = $("undo-btn"), r = $("redo-btn");
    if (u) u.addEventListener("click", (e) => { e.preventDefault(); doUndo(); });
    if (r) r.addEventListener("click", (e) => { e.preventDefault(); doRedo(); });
    editor.addEventListener("input", undoSnapshot); // 编辑→快照入撤销栈
    editor.addEventListener("keyup", navOnEdit);
    editor.addEventListener("click", navOnEdit);
    // Ctrl+Z / Ctrl+Y 拦截→自定义撤销/重做（拦截 textarea 原生 undo，避免两套冲突）
    editor.addEventListener("keydown", (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key.toLowerCase() === "z" && !e.shiftKey) { e.preventDefault(); doUndo(); }
      else if (mod && (e.key.toLowerCase() === "y" || (e.key.toLowerCase() === "z" && e.shiftKey))) { e.preventDefault(); doRedo(); }
    });
    // 导航历史（编辑位置跳转）仍由 Alt+← / Alt+→ 触发
    document.addEventListener("keydown", (e) => {
      if (e.altKey && !e.shiftKey && !(e.metaKey || e.ctrlKey)) {
        if (e.key === "ArrowLeft") { e.preventDefault(); navBack(); }
        else if (e.key === "ArrowRight") { e.preventDefault(); navFwd(); }
      }
    });
  })();

  /* ---------- 文件名 / 视图 ---------- */
  function setFileName(name) {
    const tab = activeTab();
    const n = name || t("untitled");
    if (tab) tab.name = n;
    document.title = n + " — MDeX";
    renderTabs();
  }
  // 视图模式轮换按钮：分屏 → 仅编辑 → 仅预览 → 分屏
  const VIEW_MODES = ["split", "editor", "preview"];
  let curViewMode = "split";
  function refreshViewLabel() {
    const vm = $("view-mode");
    if (!vm) return;
    vm.textContent = curViewMode === "split" ? t("split")
      : curViewMode === "editor" ? t("editorOnly") : t("previewOnly");
  }
  function setViewMode(mode) {
    clearColSel();
    const wasEditor = curViewMode === "editor";
    curViewMode = mode;
    main.classList.remove("view-split", "view-editor", "view-preview");
    main.classList.add("view-" + mode);
    refreshViewLabel();
    // 从「仅编辑」切回含预览的视图，且预览曾被跳过时，补一次渲染
    if (wasEditor && mode !== "editor" && previewDirty) render();
  }
  $("view-mode").addEventListener("click", () => {
    const idx = VIEW_MODES.indexOf(curViewMode);
    setViewMode(VIEW_MODES[(idx + 1) % VIEW_MODES.length]);
  });

  function toggleTheme() {
    const dark = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", dark);
    try { localStorage.setItem("md-theme", dark ? "dark" : "light"); } catch (_) {}
    refreshDynamicLabels();
    // mermaid 主题跟随：重新初始化并重渲（SVG 配色是渲染时烘焙的，需重渲才更新）
    initMermaid();
    scheduleRender();
  }
  $("theme-btn").addEventListener("click", toggleTheme);
  $("sync-btn").addEventListener("click", () => {
    syncScroll = !syncScroll;
    refreshDynamicLabels();
  });

  /* ---------- 文件操作 ---------- */
  function dirOf(p) { const i = p.lastIndexOf("/"); return i >= 0 ? p.slice(0, i) : ""; }
  function baseName(p) { const i = p.lastIndexOf("/"); return i >= 0 ? p.slice(i + 1) : p; }

  /* ---------- 多标签页 ---------- */
  // 示例文档版本：模板内容有实质改动时 bump。启动恢复会话时，自动把过期的示例标签
  // 内容刷新为最新模板（仅限带 sample 标记且未另存为文件的标签；用户自有文档永不触碰）。
  const SAMPLE_VER = 2;
  function createTab(opts) {
    const tab = {
      id: nextId++,
      name: opts.name || t("untitled"),
      path: opts.path || "",
      dir: opts.dir || "",
      content: opts.content != null ? opts.content : "",
      type: opts.type || "md", // "md" | "html"：决定 render() 走 Markdown 还是 HTML 渲染
      bibText: opts.bibText || "", // 加载的 .bib 文献库内容（参考文献渲染用）
      sample: opts.sample || null, // {kind,ver}：标记为内置示例文档（cite/mermaid/mdex），便于模板更新后自动刷新
      imgDir: opts.imgDir || null, // 本标签粘贴图片的落盘目录（草稿=缓存临时目录，已保存=<文档目录>/<文件名>_images）
      imgSub: opts.imgSub || null, // markdown 里写的引用前缀（草稿=绝对路径，已保存=<文件名>_images）
      dirty: false,
      scrollTop: 0,
      selStart: 0,
      selEnd: 0,
    };
    tabs.push(tab);
    return tab;
  }
  // 按文件名扩展名判定文档类型
  function fileTypeOf(name) {
    return /\.(html?|xhtml)$/i.test(name || "") ? "html" : "md";
  }

  function renderTabs() {
    const bar = $("tabs");
    bar.innerHTML = "";
    tabs.forEach((tab) => {
      const el = document.createElement("div");
      el.className = "tab" + (tab.id === activeId ? " active" : "");
      el.title = tab.path || tab.name;
      if (tab.dirty) {
        const dot = document.createElement("span");
        dot.className = "tab-dirty";
        el.appendChild(dot);
      }
      const name = document.createElement("span");
      name.className = "tab-name";
      name.textContent = tab.name;
      el.appendChild(name);
      const close = document.createElement("button");
      close.className = "tab-close";
      close.title = t("closeFile");
      close.textContent = "×";
      close.addEventListener("click", (e) => { e.stopPropagation(); closeTab(tab.id); });
      el.appendChild(close);
      el.addEventListener("click", () => switchTab(tab.id));
      el.addEventListener("mousedown", (e) => { if (e.button === 1) { e.preventDefault(); closeTab(tab.id); } });
      bar.appendChild(el);
    });
    updateEmptyState();
  }

  // 空状态切换：所有标签都关闭后，主区域不再自动新建「未命名」空白标签，
  // 改为显示居中提示「请打开或创建一个 Markdown 文件」；重新打开/新建文件时自动恢复。
  // 在 renderTabs 末尾调用，覆盖所有增删/切换/语言变更路径（renderTabs 是标签变更的统一收口）。
  function updateEmptyState() {
    const empty = tabs.length === 0;
    const mainEl = $("main");
    if (mainEl) mainEl.classList.toggle("no-tabs", empty);
    if (empty) {
      activeId = null;
      document.title = "MDeX";
      editor.value = "";
      const pv = $("preview");
      if (pv) pv.innerHTML = "";
    }
  }

  // 切换前把当前编辑器状态存回活动标签，再载入目标标签
  function switchTab(id) {
    if (id === activeId) return;
    const cur = activeTab();
    if (cur) {
      cur.content = editor.value;
      cur.scrollTop = editor.scrollTop;
      cur.selStart = editor.selectionStart;
      cur.selEnd = editor.selectionEnd;
    }
    activeId = id;
    loadTab(activeTab());
    renderTabs();
    saveDraft();
    navPush(); // 记录导航点（程序化切换由 navSuppress 抑制）
  }

  function loadTab(tab) {
    clearColSel();
    if (!tab) { editor.value = ""; updateStats(); updateCursor(); return; }
    resetUndo(); // 切标签→重置撤销/重做栈（每个标签独立 undo 上下文）
    editor.value = tab.content;
    editor.setSelectionRange(tab.selStart || 0, tab.selEnd || 0);
    document.title = tab.name + " — MDeX";
    // 延后一帧再渲染预览：先让编辑器文本绘制出来（大文件下用户立刻看到内容），
    // 随后才进入较重的预览渲染，避免打开时整窗卡住几秒。
    requestAnimationFrame(() => render());
    if (tab.scrollTop) editor.scrollTop = tab.scrollTop;
    updateCursor();
    // 切标签时同步文献库徽标条数
    {
      let n = 0;
      if (window.BibTeXParser && tab.bibText && tab.bibText.trim()) {
        try { n = ((window.BibTeXParser.parse(tab.bibText, { sentenceCase: false }) || {}).entries || []).length; } catch (e) {}
      }
      updateBibBadge(n);
    }
  }

  function markDirty() {
    const tab = activeTab();
    if (tab && !tab.dirty) { tab.dirty = true; renderTabs(); }
  }

  function newFile() {
    const tab = createTab({ content: "" });
    switchTab(tab.id);
    editor.focus();
  }

  // 未保存关闭确认弹窗。返回 "cancel" | "discard" | "save"。
  // 用自绘弹窗而非原生 confirm()：Tauri WKWebView 下 confirm() 行为不稳定，
  // 且三按钮（取消/不保存/保存）比浏览器二选一更符合编辑器习惯。
  function confirmCloseDialog() {
    return new Promise((resolve) => {
      const mask = $("confirm-mask");
      $("confirm-msg").textContent = t("confirmClose");
      $("confirm-cancel").textContent = t("cancel");
      $("confirm-discard").textContent = t("dontSave");
      $("confirm-save").textContent = t("save");
      mask.hidden = false;
      const done = (v) => { mask.hidden = true; cleanup(); resolve(v); };
      const onMask = (e) => { if (e.target === mask) done("cancel"); };
      const onKey = (e) => { if (e.key === "Escape") done("cancel"); };
      function cleanup() {
        $("confirm-cancel").onclick = null;
        $("confirm-discard").onclick = null;
        $("confirm-save").onclick = null;
        mask.removeEventListener("click", onMask);
        document.removeEventListener("keydown", onKey);
      }
      $("confirm-cancel").onclick = () => done("cancel");
      $("confirm-discard").onclick = () => done("discard");
      $("confirm-save").onclick = () => done("save");
      mask.addEventListener("click", onMask);
      document.addEventListener("keydown", onKey);
      $("confirm-discard").focus();
    });
  }

  async function closeTab(id) {
    const idx = tabs.findIndex((x) => x.id === id);
    if (idx < 0) return;
    const tab = tabs[idx];
    if (tab.dirty) {
      const choice = await confirmCloseDialog();
      if (choice === "cancel") return;
      if (choice === "save") {
        // 保存作用于被关闭的标签：先切到它，再走源文件保存
        if (activeId !== id) switchTab(id);
        const ok = await saveFile();
        if (!ok || tab.dirty) return; // 保存被取消/失败 → 不关闭
      }
    }
    tabs.splice(idx, 1);
    if (tab.path && isTauri) invoke("unregister_file", { path: tab.path }).catch(() => {});
    // 未保存草稿：清理其临时图片目录（已保存的图片在文档目录，不动）
    if (!tab.path && tab.imgDir && isTauri) invoke("remove_dir", { path: tab.imgDir }).catch(() => {});
    if (activeId === id) {
      if (tabs.length === 0) {
        // 最后一个标签已关闭：进入空状态（显示「请打开或创建…」提示），不再自动新建空白标签。
        activeId = null;
        loadTab(null);
      } else {
        activeId = tabs[Math.min(idx, tabs.length - 1)].id;
        loadTab(activeTab());
      }
    }
    renderTabs(); // → updateEmptyState() 显示空状态或恢复编辑区
    saveDraft();
    navPrune(); // 清理已关闭标签的导航点
  }

  // 工具栏/菜单「关闭」= 关闭当前标签
  function closeFile() {
    if (activeId != null) closeTab(activeId);
  }

  async function openFile() {
    if (isTauri) {
      try {
        const data = await invoke("pick_and_read");
