<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F7CFF"/>
      <stop offset="1" stop-color="#2647C8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="20" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- full-square background (macOS masks to squircle) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- paper card -->
  <g filter="url(#shadow)">
    <rect x="222" y="196" width="580" height="632" rx="72" ry="72" fill="url(#card)"/>
  </g>

  <!-- markdown M glyph -->
  <g fill="#2647C8">
    <rect x="318" y="430" width="64" height="244"/>
    <rect x="642" y="430" width="64" height="244"/>
    <path d="M382 430 L512 560 L642 430 L642 522 L512 652 L382 522 Z"/>
  </g>

  <!-- text lines -->
  <g fill="#9FB0F0">
    <rect x="330" y="716" width="364" height="32" rx="16"/>
    <rect x="330" y="772" width="252" height="32" rx="16"/>
  </g>
</svg>
